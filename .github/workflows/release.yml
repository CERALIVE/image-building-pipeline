name: Release candidate real-HW gate

on:
  push:
    branches: ['release/**', 'release-*']
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  candidate:
    runs-on: [self-hosted, ceralive-image-builder]
    outputs:
      artifact_name: ${{ steps.meta.outputs.artifact_name }}
      artifact_digest: ${{ steps.upload.outputs.artifact-digest }}
      raw_filename: ${{ steps.meta.outputs.raw_filename }}
      raw_sha256: ${{ steps.meta.outputs.raw_sha256 }}
      bundle_filename: ${{ steps.meta.outputs.bundle_filename }}
      keyring_filename: ${{ steps.meta.outputs.keyring_filename }}
      commit: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v7
      - name: Materialize release trust inputs
        env:
          RAUC_RELEASE_PKI_TAR_B64: ${{ secrets.RAUC_RELEASE_PKI_TAR_B64 }}
          ARMBIAN_APT_KEYRING_B64: ${{ secrets.ARMBIAN_APT_KEYRING_B64 }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${RUNNER_TEMP}/release-pki"
          printf '%s' "${RAUC_RELEASE_PKI_TAR_B64}" | base64 -d | tar -xz -C "${RUNNER_TEMP}/release-pki"
          printf '%s' "${ARMBIAN_APT_KEYRING_B64}" | base64 -d > "${RUNNER_TEMP}/armbian-keyring.gpg"
      - name: Build exact production candidate
        env:
          CERALIVE_BUILD_MODE: production
          CERALIVE_RAUC_PKI_DIR: ${{ runner.temp }}/release-pki
          RAUC_KEYRING_FILE: ${{ runner.temp }}/release-pki/root-ca.pem
          ARMBIAN_APT_KEYRING: ${{ runner.temp }}/armbian-keyring.gpg
          APT_GPG_PUBLIC_B64: ${{ secrets.APT_GPG_PUBLIC_B64 }}
          APT_CLIENT_CRT_B64: ${{ secrets.APT_CLIENT_CRT_B64 }}
          APT_CLIENT_KEY_B64: ${{ secrets.APT_CLIENT_KEY_B64 }}
        run: ./v2/build rock-5b-plus
      - name: Build candidate-bound signed rollback probe
        env:
          CERALIVE_RAUC_PKI_DIR: ${{ runner.temp }}/release-pki
          COMPATIBLE_STRING: ceralive-rock-5b-plus
        run: |
          set -euo pipefail
          mapfile -t roots < <(find v2/images/rock-5b-plus -maxdepth 1 -type f -name '*.rootfs.tar')
          (( ${#roots[@]} == 1 ))
          mkdir -p "${RUNNER_TEMP}/rollback-root/etc/systemd/system" "${RUNNER_TEMP}/rollback-bundle"
          tar -xf "${roots[0]}" -C "${RUNNER_TEMP}/rollback-root"
          ln -sf /dev/null "${RUNNER_TEMP}/rollback-root/etc/systemd/system/ceralive.service"
          BUNDLE_VERSION="${GITHUB_SHA}-rollback-probe" \
            BUNDLE_OUT_DIR="${RUNNER_TEMP}/rollback-bundle" BUNDLE_TS=bad \
            ./v2/lib/build-bundle.sh rock-5b-plus "${RUNNER_TEMP}/rollback-root"
      - id: meta
        name: Seal candidate metadata
        run: |
          set -euo pipefail
          mapfile -t raws < <(find v2/images/rock-5b-plus -maxdepth 1 -type f -name '*.raw')
          mapfile -t bundles < <(find v2/images/rock-5b-plus -maxdepth 1 -type f -name '*.raucb')
          (( ${#raws[@]} == 1 && ${#bundles[@]} == 1 ))
          mkdir candidate
          cp "${raws[0]}" "${RUNNER_TEMP}/release-pki/root-ca.pem" candidate/
          cp "${bundles[0]}" candidate/good.raucb
          cp "${RUNNER_TEMP}/rollback-bundle/bad.raucb" candidate/bad.raucb
          raw_name="$(basename "${raws[0]}")"; bundle_name=good.raucb
          sha256sum "candidate/${raw_name}" > candidate/raw.sha256
          {
            echo "artifact_name=rock-5b-plus-${GITHUB_SHA}"
            echo "raw_filename=${raw_name}"
            echo "raw_sha256=$(cut -d' ' -f1 candidate/raw.sha256)"
            echo "bundle_filename=${bundle_name}"
            echo "keyring_filename=root-ca.pem"
          } >> "${GITHUB_OUTPUT}"
      - id: upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: candidate/
          if-no-files-found: error
          retention-days: 7
      - name: Remove release secrets and temporary roots
        if: ${{ always() }}
        run: |
          rm -rf "${RUNNER_TEMP}/release-pki" "${RUNNER_TEMP}/armbian-keyring.gpg" \
            "${RUNNER_TEMP}/rollback-root" "${RUNNER_TEMP}/rollback-bundle"
  realhw:
    needs: candidate
    uses: ./.github/workflows/realhw-job.yml
    with:
      board: rock-5b-plus
      candidate_artifact_name: ${{ needs.candidate.outputs.artifact_name }}
      candidate_artifact_digest: ${{ needs.candidate.outputs.artifact_digest }}
      candidate_raw_filename: ${{ needs.candidate.outputs.raw_filename }}
      candidate_raw_sha256: ${{ needs.candidate.outputs.raw_sha256 }}
      candidate_bundle_filename: ${{ needs.candidate.outputs.bundle_filename }}
      candidate_keyring_filename: ${{ needs.candidate.outputs.keyring_filename }}
      candidate_commit: ${{ needs.candidate.outputs.commit }}
