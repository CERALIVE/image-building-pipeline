# CeraUI Image Building Pipeline - GitHub Actions
# Automated builds for all supported devices

name: Build Images

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly builds every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      device:
        description: 'Device to build (orangepi5plus, rock5bplus, all)'
        required: false
        default: 'all'
      variant:
        description: 'Build variant (minimal, standard, development)'
        required: false
        default: 'standard'
      channel:
        description: 'Package channel (stable, beta)'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
      force_rebuild:
        description: 'Force clean rebuild'
        type: boolean
        required: false
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ceralive/ceraui-images
  CHANNEL: ${{ github.event.inputs.channel || 'stable' }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        device: [orangepi5plus, rock5bplus]
        variant: [minimal, standard]
        # Only build development variant on schedule or manual trigger
        include:
          - device: orangepi5plus
            variant: development
            build_condition: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          - device: rock5bplus  
            variant: development
            build_condition: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    
    # Skip development builds on normal pushes
    if: ${{ !contains(matrix.variant, 'development') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Free up disk space
      run: |
        # Free up space on GitHub runners (they're quite limited)
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        df -h

    - name: Install AWS CLI
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip -q awscliv2.zip
        sudo ./aws/install

    - name: Fetch CeraLive packages from R2
      env:
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        R2_BUCKET: ${{ secrets.R2_BUCKET }}
        CHANNEL: ${{ env.CHANNEL }}
        ARCH: arm64
        DEST: ./debs
      run: |
        ./scripts/fetch-debs.sh

    - name: Prepare mTLS certificates
      env:
        APT_CLIENT_CRT_B64: ${{ secrets.APT_CLIENT_CRT_B64 }}
        APT_CLIENT_KEY_B64: ${{ secrets.APT_CLIENT_KEY_B64 }}
        APT_GPG_PUBLIC_B64: ${{ secrets.APT_GPG_PUBLIC_B64 }}
      run: |
        # Export secrets as files for the build script
        mkdir -p /tmp/build-secrets
        if [[ -n "$APT_CLIENT_CRT_B64" ]]; then
          echo "$APT_CLIENT_CRT_B64" > /tmp/build-secrets/APT_CLIENT_CRT_B64
          echo "$APT_CLIENT_KEY_B64" > /tmp/build-secrets/APT_CLIENT_KEY_B64
        fi
        if [[ -n "$APT_GPG_PUBLIC_B64" ]]; then
          echo "$APT_GPG_PUBLIC_B64" > /tmp/build-secrets/APT_GPG_PUBLIC_B64
        fi
        
    - name: Build CeraUI image
      env:
        APT_CLIENT_CRT_B64: ${{ secrets.APT_CLIENT_CRT_B64 }}
        APT_CLIENT_KEY_B64: ${{ secrets.APT_CLIENT_KEY_B64 }}
        APT_GPG_PUBLIC_B64: ${{ secrets.APT_GPG_PUBLIC_B64 }}
        CHANNEL: ${{ env.CHANNEL }}
      run: |
        # Set build parameters
        DEVICE="${{ matrix.device }}"
        VARIANT="${{ matrix.variant }}"
        CLEAN_FLAG=""
        
        # Force clean build if requested
        if [[ "${{ github.event.inputs.force_rebuild }}" == "true" ]]; then
          CLEAN_FLAG="--clean"
        fi
        
        # Copy fetched .deb packages to overlay
        mkdir -p userpatches/overlay/tmp/debs
        cp -r ./debs/* userpatches/overlay/tmp/debs/ 2>/dev/null || true
        
        # Build the image
        ./build.sh --device "$DEVICE" --variant "$VARIANT" --environment docker $CLEAN_FLAG --verbose
        
    - name: Test built image
      run: |
        # Run basic tests on the built image
        if [[ -f "tests/test-image.sh" ]]; then
          ./tests/test-image.sh "${{ matrix.device }}" "${{ matrix.variant }}"
        fi
        
    - name: Calculate checksums
      run: |
        cd "images/${{ matrix.device }}/${{ matrix.variant }}/"
        sha256sum *.img.xz > checksums.sha256
        sha512sum *.img.xz > checksums.sha512
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ceraui-${{ matrix.device }}-${{ matrix.variant }}
        path: |
          images/${{ matrix.device }}/${{ matrix.variant }}/*.img.xz
          images/${{ matrix.device }}/${{ matrix.variant }}/*.sha256
          images/${{ matrix.device }}/${{ matrix.variant }}/*.sha512
        retention-days: 30
        
    - name: Create release (on tags)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          images/${{ matrix.device }}/${{ matrix.variant }}/*.img.xz
          images/${{ matrix.device }}/${{ matrix.variant }}/*.sha256
          images/${{ matrix.device }}/${{ matrix.variant }}/*.sha512
        generate_release_notes: true
        
  notify:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify build status
      run: |
        if [[ "${{ needs.build.result }}" == "success" ]]; then
          echo "✅ CeraUI images built successfully"
        else
          echo "❌ CeraUI image builds failed"
          exit 1
        fi
