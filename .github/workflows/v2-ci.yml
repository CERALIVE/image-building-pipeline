# CeraLive v2 image pipeline — CI gate.
#
# The SOLE image-build CI gate: the legacy Armbian build.sh path (and its
# build-images.yml workflow) has been removed. This workflow gates the v2/
# manifest+mkosi pipeline: lint -> schema -> unit tests -> multi-arch
# build-plan. No secrets are referenced; the build matrix runs DRY_RUN=1 so it
# performs no real download/build (no R2 creds, no GPG, no privileged container,
# no board required).

name: v2 Pipeline CI

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: v2-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck (v2 bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck --version

      - name: shellcheck -x all v2 bash
        run: |
          mapfile -t files < <(git ls-files 'v2/**/*.sh' 'v2/build' 'v2/dev-push' 'v2/run-tests')
          printf 'checking %d file(s)\n' "${#files[@]}"
          # v2/.shellcheckrc (external-sources=true, source-path=SCRIPTDIR) is
          # auto-discovered from each script's parent dirs, so `source lib/*.sh`
          # resolves without per-call -x flags. --severity=warning: SC2015/SC1091
          # are info-level project baseline (see learnings, tasks 9/26/29).
          shellcheck --severity=warning -x "${files[@]}"

  schema-validate:
    name: JSON-Schema validate manifests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install validators
        run: pip install --quiet jsonschema PyYAML

      - name: Validate every manifest against its schema
        run: python3 v2/ci/validate-manifests.py

  bats:
    name: bats manifest unit suite
    runs-on: ubuntu-latest
    needs: schema-validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install resolver deps (resolve.py uses jsonschema + PyYAML)
        run: pip install --quiet jsonschema PyYAML

      - name: Install bats-core
        run: |
          git clone --depth=1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      - name: Stub sibling-checkout workspace
        run: |
          # fetch-debs asserts ceracoder/ srtla/ CeraUI/ are siblings of the
          # workspace root (ARCHITECTURE.md §5). Only image-building-pipeline is
          # checked out here, so point CERALIVE_WORKSPACE at a stub tree. Under
          # DRY_RUN no .debs are built from source, so empty dirs satisfy the
          # tripwire without needing the real sibling repos.
          ws="${RUNNER_TEMP}/ceralive-ws"
          mkdir -p "${ws}/ceracoder" "${ws}/srtla" "${ws}/CeraUI"
          echo "CERALIVE_WORKSPACE=${ws}" >> "$GITHUB_ENV"

      - name: Run v2 manifest unit suite
        run: ./v2/run-tests

  size-gate:
    # REPORT-ONLY size measurement (Task 8). Sizes rootfs CONTENT via
    # measure-size.sh (du --apparent-size -sb on the artifact/tree — NOT the
    # frozen 4096 MB partition, G4/E5) and prints `measured=<N> budget=null
    # (report-only)`. The DRY_RUN matrix ships no real rootfs, so this exercises
    # the mechanism against a synthetic content tree. While every budget is null
    # this MUST exit 0 — Task 20 flips it to blocking by setting a threshold in
    # manifests/size-budget.json (no workflow change needed then).
    name: rootfs size measurement (report-only)
    runs-on: ubuntu-latest
    needs: bats
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Measure rootfs content vs budget (report-only — threshold null)
        run: |
          # No real rootfs under DRY_RUN — measure a synthetic content tree to
          # prove the mechanism. apparent-size is deterministic; the run must
          # report and exit 0 while budgets remain null.
          art="${RUNNER_TEMP}/rootfs-sample"
          mkdir -p "${art}"
          head -c 4096 /dev/zero > "${art}/placeholder.bin"
          ./v2/lib/measure-size.sh rock-5b-plus "${art}" | tee size-report.log
          grep -Eq 'measured=[0-9]+ budget=null \(report-only\)' size-report.log

  build-matrix:
    name: build dry-run (${{ matrix.board }})
    runs-on: ubuntu-latest
    needs: bats
    strategy:
      fail-fast: false
      matrix:
        # rk3588 (arm64) and x86 (amd64) — proves the manifest -> builder
        # pipeline resolves for both arches without hardware.
        board: [rock-5b-plus, x86-minipc]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install resolver deps
        run: pip install --quiet jsonschema PyYAML

      - name: Stub sibling-checkout workspace
        run: |
          # fetch-debs asserts ceracoder/ srtla/ CeraUI/ are siblings of the
          # workspace root (ARCHITECTURE.md §5). Only image-building-pipeline is
          # checked out here, so point CERALIVE_WORKSPACE at a stub tree. Under
          # DRY_RUN no .debs are built from source, so empty dirs satisfy the
          # tripwire without needing the real sibling repos.
          ws="${RUNNER_TEMP}/ceralive-ws"
          mkdir -p "${ws}/ceracoder" "${ws}/srtla" "${ws}/CeraUI"
          echo "CERALIVE_WORKSPACE=${ws}" >> "$GITHUB_ENV"

      - name: Dry-run build (manifest -> builder plan; no network/hardware)
        env:
          DRY_RUN: '1'
          INSTALL_BOOT_BSP: '0'
        run: |
          ./v2/build "${{ matrix.board }}" 2>&1 | tee build-dryrun.log

      - name: Assert no real download/build happened (no secret leakage)
        run: |
          # run_or_plan logs "exec: <cmd>" for REAL commands and "DRY-RUN would
          # run: <cmd>" for planned ones; a real mkosi/docker build prints
          # "Fetched"/progress. Fail loudly if the dry-run leaked any of those.
          if grep -qiE '^\[INFO \].*exec: (apt-get|aws|gh|docker|mkosi)|^Fetched |docker run ' build-dryrun.log; then
            echo "::error::DRY_RUN performed a real network/build command"
            exit 1
          fi
          grep -q 'DRY-RUN complete' build-dryrun.log

  qemu:
    # AMD64 matrix leg only: boot the x86 (x86-minipc) disk image headlessly in
    # qemu and assert it reaches multi-user.target + ceralive.service health +
    # critical packages (v2/tests/qemu-x86.sh, task 36). qemu in CI is fragile and
    # the DRY_RUN build-matrix above ships no bootable image, so this leg is
    # continue-on-error and the harness GRACEFULLY SKIPS when qemu/OVMF/the image
    # is absent. The SELFTEST step always runs the harness's own negative test
    # (a variant missing a critical package MUST fail the gate) so this job proves
    # the gate logic on every push even before real image artifacts are wired up.
    #
    # NOT a substitute for the RK3588 real-hardware smoke (realhw-smoke.sh / task
    # 38) — this only validates the x86 amd64 OS+service layer boots.
    name: qemu x86 boot/service/package (amd64)
    runs-on: ubuntu-latest
    needs: build-matrix
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install qemu-system-x86 + OVMF (EFI/GRUB x86 image boots via UEFI)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf
          qemu-system-x86_64 --version | head -1

      - name: SELFTEST — assertion engine + negative gate (no qemu/image needed)
        env:
          CERALIVE_QEMU_SELFTEST: '1'
        run: ./v2/tests/qemu-x86.sh

      - name: Boot the x86 image in qemu (graceful skip if no artifact under DRY_RUN)
        env:
          BOARD: x86-minipc
          # The Stage-4 disk artifact lands here once the x86 build is wired up
          # (orchestrate.sh x86 path). Under the DRY_RUN matrix none exists yet, so
          # the harness auto-discovers nothing and SKIPS (exit 0). Point IMAGE_PATH
          # explicitly when a real .img artifact is downloaded into this dir.
          BOOT_TIMEOUT: '120'
        run: |
          # Use the build artifact if a downstream step downloaded one; otherwise
          # the harness skips gracefully (continue-on-error backstops either way).
          img="$(find v2/images/x86-minipc -maxdepth 1 \
                   \( -name '*.img' -o -name '*.img.xz' \) 2>/dev/null | sort | tail -1 || true)"
          if [ -n "${img}" ]; then
            echo "booting discovered x86 image: ${img}"
            IMAGE_PATH="${img}" ./v2/tests/qemu-x86.sh
          else
            echo "no x86 disk artifact present (DRY_RUN) — running harness in skip mode"
            ./v2/tests/qemu-x86.sh
          fi
