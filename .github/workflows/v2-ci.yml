# CeraLive v2 image pipeline — CI gate.
#
# The SOLE image-build CI gate: the legacy Armbian build.sh path (and its
# build-images.yml workflow) has been removed. This workflow gates the v2/
# manifest+mkosi pipeline: lint -> schema -> unit tests -> multi-arch
# build-plan. No secrets are referenced; the build matrix runs DRY_RUN=1 so it
# performs no real download/build (no R2 creds, no GPG, no privileged container,
# no board required).
#
# Cross-host parity (task 15): the build matrix also emits a per-host sha256
# sidecar (test-results/host-$(uname -s)-$(uname -m).sha256) over the NORMALIZED
# mkosi build plan — a host-independent digest that, with T14's deterministic
# builds, fixes the output bytes. Same digest on two hosts ⇒ same plan ⇒ (by
# T14) bit-identical image. The only CI runner is Linux/x86_64; Fedora/Arch/
# macOS/WSL2 are documented-not-CI-verified in v2/docs/dev-loop.md.
#
# addon-publish (task 35) stays inside the no-secrets invariant: it runs
# DRY_RUN=1 (plan only, uploads nothing) so the real aws-s3 upload in
# v2/lib/upload-addons.sh never fires without R2_* creds + a signed artifact.
#
# Cross-runner build-plan determinism (C6b): build-plan-xrunner resolves the same
# DRY_RUN plan on TWO INDEPENDENT runners (ubuntu-24.04 + ubuntu-22.04) and
# build-plan-xrunner-gate asserts the NORMALIZED per-board plan sha256 is identical
# across them — extending task 15's SAME-host rebuild-parity to a CROSS-host gate.
# PLAN-ONLY (not a full .raucb build); starts ADVISORY (see that job's header for
# the runner-diversity rationale + promotion note).

name: v2 Pipeline CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: v2-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck (v2 bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck --version

      - name: shellcheck -x all v2 bash
        run: |
          mapfile -t files < <(git ls-files 'v2/**/*.sh' 'v2/build' 'v2/dev-push' 'v2/run-tests')
          printf 'checking %d file(s)\n' "${#files[@]}"
          # v2/.shellcheckrc (external-sources=true, source-path=SCRIPTDIR) is
          # auto-discovered from each script's parent dirs, so `source lib/*.sh`
          # resolves without per-call -x flags. --severity=warning: SC2015/SC1091
          # are info-level project baseline (see learnings, tasks 9/26/29).
          shellcheck --severity=warning -x "${files[@]}"

  schema-validate:
    name: JSON-Schema validate manifests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install validators
        run: pip install --quiet jsonschema PyYAML

      - name: Validate every manifest against its schema
        run: python3 v2/ci/validate-manifests.py

  bats:
    name: bats manifest unit suite
    runs-on: ubuntu-latest
    needs: schema-validate
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install resolver deps (resolve.py uses jsonschema + PyYAML)
        run: pip install --quiet jsonschema PyYAML

      - name: Install bats-core
        run: |
          git clone --depth=1 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      - name: Stub sibling-checkout workspace
        run: |
          # fetch-debs asserts srtla/ CeraUI/ are siblings of the
          # workspace root (ARCHITECTURE.md §5). Only image-building-pipeline is
          # checked out here, so point CERALIVE_WORKSPACE at a stub tree. Under
          # DRY_RUN no .debs are built from source, so empty dirs satisfy the
          # tripwire without needing the real sibling repos.
          ws="${RUNNER_TEMP}/ceralive-ws"
          mkdir -p "${ws}/srtla" "${ws}/CeraUI"
          echo "CERALIVE_WORKSPACE=${ws}" >> "$GITHUB_ENV"

      - name: Run v2 manifest unit suite
        run: ./v2/run-tests

  size-gate:
    # Blocking per-board size ceiling. measure-size.sh sizes rootfs CONTENT
    # (du --apparent-size -sb — NOT the frozen 4096 MB partition, G4/E5). DRY_RUN
    # ships no real rootfs, so the positive leg uses a synthetic under-budget tree
    # and the negative leg a sparse 2 GiB tree that MUST trip the gate — without
    # the negative leg an always-passing gate would look identical.
    name: rootfs size gate (blocking)
    runs-on: ubuntu-latest
    needs: bats
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Gate passes — synthetic tree under the committed ceiling (enforced, exit 0)
        run: |
          set -o pipefail
          art="${RUNNER_TEMP}/rootfs-sample"
          mkdir -p "${art}"
          head -c 4096 /dev/zero > "${art}/placeholder.bin"
          ./v2/lib/measure-size.sh rock-5b-plus "${art}" 2>&1 | tee size-report.log
          grep -Eq 'measured=[0-9]+ budget=[0-9]+ \(enforced\)' size-report.log

      - name: Regression check — compare against baseline (non-blocking warning)
        run: |
          set -o pipefail
          # Extract measured bytes from the size-report.log produced above.
          # measure-size.sh outputs: "measured=<bytes> budget=<bytes> (enforced)"
          measured_bytes=$(grep -oP 'measured=\K[0-9]+' size-report.log | head -1)
          if [ -z "${measured_bytes}" ]; then
            echo "::warning::could not extract measured bytes from size-report.log"
            exit 0
          fi
          echo "Extracted measured bytes: ${measured_bytes}"
          # Invoke the regression comparator. It exits 0 if within threshold,
          # exits 1 if growth exceeds 50 MB, exits 2 on bad args/missing baseline.
          # We treat exit 1 (threshold exceeded) as a warning, not a hard failure,
          # since the absolute 1.5 GB gate already passed.
          if ! ./v2/ci/check-size-regression.sh "${measured_bytes}" v2/ci/size-baseline.json 2>&1 | tee size-regression.log; then
            exit_code=$?
            if [ ${exit_code} -eq 1 ]; then
              echo "::warning::image size growth exceeds 50 MB threshold (see size-regression.log)"
            else
              echo "::error::regression check failed with exit code ${exit_code}"
              exit ${exit_code}
            fi
          fi

      - name: Gate bites — sparse over-budget tree MUST fail the gate (non-vacuous)
        run: |
          # die() writes "exceeds budget" to stderr — fold it into the log (2>&1)
          # so the grep below sees it; the if guards the gate's non-zero exit.
          over="${RUNNER_TEMP}/rootfs-over"
          mkdir -p "${over}"
          truncate -s 2G "${over}/oversize.img"
          if ./v2/lib/measure-size.sh rock-5b-plus "${over}" > size-over.log 2>&1; then
            cat size-over.log
            echo "::error::size gate did NOT fail on an over-budget rootfs"
            exit 1
          fi
          cat size-over.log
          grep -q 'exceeds budget' size-over.log

  addon-publish:
    # Feature-sysext R2 publish contract. The real path (v2/lib/upload-addons.sh,
    # aws s3 cp + R2 endpoint — same pattern as fetch-debs.sh) only fires with
    # R2_* creds AND a signed .raw, neither present here. So this job proves the
    # contract under DRY_RUN: a synthetic SIGNED artifact set asserts the plan
    # targets the canonical addons/{os_version}/{board}/{feature} keys with the
    # right per-file content-type, and a non-vacuous negative leg asserts the
    # trust gate REFUSES an unsigned .raw (no upload without a .sig).
    name: addon publish contract (dry-run plan + unsigned-refusal gate)
    runs-on: ubuntu-latest
    needs: bats
    steps:
      - uses: actions/checkout@v7

      - name: Plan targets the per-board/per-OS R2 keys (DRY_RUN, signed inputs)
        env:
          DRY_RUN: '1'
          R2_BUCKET: apt-storage
          R2_ENDPOINT: https://r2.example
        run: |
          set -euo pipefail
          dist="${RUNNER_TEMP}/addon-dist"
          mkdir -p "${dist}"
          stem="debug-toolset-rock-5b-plus-12"
          head -c 4096 /dev/zero > "${dist}/${stem}.raw"
          ( cd "${dist}" && sha256sum "${stem}.raw" > "${stem}.raw.sha256" )
          printf 'stub-detached-signature\n' > "${dist}/${stem}.raw.sig"
          ./v2/lib/upload-addons.sh \
            --feature debug-toolset --board rock-5b-plus --os-version 12 \
            --dist "${dist}" 2>&1 | tee addon-plan.log
          # All three artifacts must target addons/{os_version}/{board}/{feature}.
          grep -qE 's3://apt-storage/addons/12/rock-5b-plus/debug-toolset\.raw ' addon-plan.log
          grep -q  's3://apt-storage/addons/12/rock-5b-plus/debug-toolset.raw.sha256' addon-plan.log
          grep -q  's3://apt-storage/addons/12/rock-5b-plus/debug-toolset.raw.sig' addon-plan.log
          # Content-type pinned per file so R2 stores what the worker serves.
          grep -q 'debug-toolset.raw --endpoint-url https://r2.example --content-type application/octet-stream' addon-plan.log
          grep -q 'debug-toolset.raw.sig --endpoint-url https://r2.example --content-type text/plain' addon-plan.log

      - name: Trust gate bites — an UNSIGNED add-on MUST be refused (non-vacuous)
        env:
          DRY_RUN: '1'
          R2_BUCKET: apt-storage
          R2_ENDPOINT: https://r2.example
        run: |
          dist="${RUNNER_TEMP}/addon-unsigned"
          mkdir -p "${dist}"
          stem="debug-toolset-rock-5b-plus-12"
          head -c 4096 /dev/zero > "${dist}/${stem}.raw"
          ( cd "${dist}" && sha256sum "${stem}.raw" > "${stem}.raw.sha256" )
          # No .raw.sig on purpose — the publisher MUST refuse to upload.
          if ./v2/lib/upload-addons.sh \
               --feature debug-toolset --board rock-5b-plus --os-version 12 \
               --dist "${dist}" > addon-unsigned.log 2>&1; then
            cat addon-unsigned.log
            echo "::error::upload-addons.sh published an UNSIGNED add-on"
            exit 1
          fi
          cat addon-unsigned.log
          grep -q 'refusing to publish UNSIGNED add-on' addon-unsigned.log

  build-matrix:
    # Dry-run resolves the containerized build plan for both arches, then emits a
    # cross-host sha256 sidecar over the NORMALIZED plan (task 15): same digest
    # across hosts ⇒ identical builder invocation ⇒ (by T14's deterministic
    # builds) a bit-identical image. A second resolve asserts the digest is
    # reproducible (parity has teeth). Sidecar uploaded as host-sha256-<board>.
    name: build dry-run + host sha256 (${{ matrix.board }})
    runs-on: ubuntu-latest
    needs: bats
    strategy:
      fail-fast: false
      matrix:
        # rk3588 (arm64) and x86 (amd64) — proves the manifest -> builder
        # pipeline resolves for both arches without hardware.
        board: [rock-5b-plus, x86-minipc]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install resolver deps
        run: pip install --quiet jsonschema PyYAML

      - name: Stub sibling-checkout workspace
        run: |
          # fetch-debs asserts srtla/ CeraUI/ are siblings of the
          # workspace root (ARCHITECTURE.md §5). Only image-building-pipeline is
          # checked out here, so point CERALIVE_WORKSPACE at a stub tree. Under
          # DRY_RUN no .debs are built from source, so empty dirs satisfy the
          # tripwire without needing the real sibling repos.
          ws="${RUNNER_TEMP}/ceralive-ws"
          mkdir -p "${ws}/srtla" "${ws}/CeraUI"
          echo "CERALIVE_WORKSPACE=${ws}" >> "$GITHUB_ENV"

      - name: Dry-run build (manifest -> builder plan; no network/hardware)
        env:
          DRY_RUN: '1'
          INSTALL_BOOT_BSP: '0'
        run: |
          ./v2/build "${{ matrix.board }}" 2>&1 | tee build-dryrun.log

      - name: Assert no real download/build happened (no secret leakage)
        run: |
          # run_or_plan logs "exec: <cmd>" for REAL commands and "DRY-RUN would
          # run: <cmd>" for planned ones; a real mkosi/docker build prints
          # "Fetched"/progress. Fail loudly if the dry-run leaked any of those.
          if grep -qiE '^\[INFO \].*exec: (apt-get|aws|gh|docker|mkosi)|^Fetched |docker run ' build-dryrun.log; then
            echo "::error::DRY_RUN performed a real network/build command"
            exit 1
          fi
          grep -q 'DRY-RUN complete' build-dryrun.log

      - name: Emit host sha256 sidecar (cross-host build-plan parity, task 15)
        run: |
          # Cross-host parity proxy. CI cannot run the real privileged mkosi
          # build (no network/privileged container/board under DRY_RUN), so it
          # cannot emit the real .raucb sha256 (that is T14's full-build proof).
          # What it CAN prove is that this host resolves the *exact same builder
          # invocation* every other host would — the normalized mkosi plan that,
          # combined with T14's SOURCE_DATE_EPOCH determinism, fully fixes the
          # output bytes. Two hosts whose sidecars match resolve an identical
          # plan; given T14 they would produce a bit-identical image.
          #
          # The raw plan line embeds this checkout's ABSOLUTE path (differs per
          # host/runner), so strip it to a stable <REPO> token before hashing —
          # otherwise the sha would encode the runner's workdir, not the build.
          set -euo pipefail
          mkdir -p test-results
          repo="${GITHUB_WORKSPACE:-$PWD}"
          # Container-path assertion: the dry-run MUST resolve the containerized
          # builder (docker/podman) on the runner, never the --native opt-in.
          if ! grep -Eq 'DRY_RUN=1 \((docker|podman)\)' build-dryrun.log; then
            echo "::error::build-matrix did not resolve the container path (expected docker/podman)"
            exit 1
          fi
          plan="$(grep -F 'would build with:' build-dryrun.log \
                  | sed -E 's/^.*would build with: //' \
                  | sed "s#${repo}#<REPO>#g")"
          [ -n "${plan}" ] || { echo "::error::no resolved mkosi plan in build-dryrun.log"; exit 1; }
          sha="$(printf '%s\n' "${plan}" | sha256sum | cut -d' ' -f1)"
          host="$(uname -s)-$(uname -m)"
          sidecar="test-results/host-${host}.sha256"
          # sha256sum-style line (machine-checkable); board-tagged so a multi-leg
          # matrix never produces an ambiguous "which board?" digest.
          printf '%s  %s.buildplan\n' "${sha}" "${{ matrix.board }}" > "${sidecar}"
          echo "wrote ${sidecar}:"; cat "${sidecar}"
          echo "PLAN_SHA=${sha}" >> "$GITHUB_ENV"

      - name: Assert sha256 parity (rebuild → identical normalized plan, has teeth)
        env:
          DRY_RUN: '1'
          INSTALL_BOOT_BSP: '0'
        run: |
          # Reproducibility teeth: re-resolve the same board and assert the
          # normalized plan sha is BYTE-IDENTICAL to the sidecar. A non-vacuous
          # parity gate — if board resolution ever became host/time-dependent
          # this fails. (CERALIVE_WORKSPACE is already exported by the stub step.)
          set -euo pipefail
          repo="${GITHUB_WORKSPACE:-$PWD}"
          ./v2/build "${{ matrix.board }}" 2>&1 | tee build-dryrun-2.log >/dev/null
          plan2="$(grep -F 'would build with:' build-dryrun-2.log \
                   | sed -E 's/^.*would build with: //' \
                   | sed "s#${repo}#<REPO>#g")"
          sha2="$(printf '%s\n' "${plan2}" | sha256sum | cut -d' ' -f1)"
          if [ "${sha2}" != "${PLAN_SHA}" ]; then
            echo "::error::build-plan sha256 not reproducible: ${PLAN_SHA} != ${sha2}"
            exit 1
          fi
          echo "sha256 parity OK: ${PLAN_SHA} (identical across rebuilds on $(uname -s)-$(uname -m))"

      - name: Upload host sha256 sidecar
        uses: actions/upload-artifact@v7
        with:
          name: host-sha256-${{ matrix.board }}
          path: test-results/host-*.sha256
          if-no-files-found: error

  qemu:
    # AMD64 matrix leg only: boot the x86 (x86-minipc) disk image headlessly in
    # qemu and assert it reaches multi-user.target + ceralive.service health +
    # critical packages (v2/tests/qemu-x86.sh, task 36). qemu is REQUIRED in CI
    # (MAC4: fail loudly if missing, not skip). The DRY_RUN build-matrix above
    # ships no bootable image, so the BOOT step gracefully skips when the image
    # is absent (but qemu itself MUST be present). The SELFTEST step always runs
    # the harness's own negative test (a variant missing a critical package MUST
    # fail the gate) so this job proves the gate logic on every push even before
    # real image artifacts are wired up.
    #
    # NOT a substitute for the RK3588 real-hardware smoke (realhw-smoke.sh / task
    # 38) — this only validates the x86 amd64 OS+service layer boots.
    #
    # Timeout model: 10 min provisioning + 10 min TCG + 10 min runner overhead.
    # The inner bounds preserve the QEMU budget even when apt is slow.
    name: qemu x86 boot/service/package (amd64)
    runs-on: ubuntu-latest
    needs: build-matrix
    timeout-minutes: 30
    env:
      PROVISION_BUDGET_MINUTES: '10'
      QEMU_TIMEOUT_MINUTES: '10'
      RUNNER_OVERHEAD_BUDGET_MINUTES: '10'
    steps:
      - uses: actions/checkout@v7

      - name: Install qemu-system-x86 + OVMF (EFI/GRUB x86 image boots via UEFI)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends qemu-system-x86 ovmf
          qemu-system-x86_64 --version | head -1

      - name: Verify qemu-system-x86_64 is available (MAC4 — fail loudly if missing)
        run: |
          if ! command -v qemu-system-x86_64 &>/dev/null; then
            echo "::error::qemu-system-x86_64 not found in PATH after install step"
            exit 1
          fi
          echo "qemu-system-x86_64 available: $(qemu-system-x86_64 --version | head -1)"

      - name: SELFTEST — assertion engine + negative gate (no qemu/image needed)
        env:
          CERALIVE_QEMU_SELFTEST: '1'
        run: ./v2/tests/qemu-x86.sh

      - name: Boot the x86 image in qemu (skip if no artifact under DRY_RUN)
        env:
          BOARD: x86-minipc
          # The Stage-4 disk artifact lands here once the x86 build is wired up
          # (orchestrate.sh x86 path). Under the DRY_RUN matrix none exists yet, so
          # the harness auto-discovers nothing and SKIPS (exit 0). Point IMAGE_PATH
          # explicitly when a real .img artifact is downloaded into this dir.
          BOOT_TIMEOUT: '120'
        run: |
          # Use the build artifact if a downstream step downloaded one; otherwise
          # the harness skips gracefully (image is optional under DRY_RUN).
          img="$(find v2/images/x86-minipc -maxdepth 1 \
                   \( -name '*.img' -o -name '*.img.xz' \) 2>/dev/null | sort | tail -1 || true)"
          if [ -n "${img}" ]; then
            echo "booting discovered x86 image: ${img}"
            IMAGE_PATH="${img}" timeout --signal=TERM --kill-after=30s \
              "${QEMU_TIMEOUT_MINUTES}m" ./v2/tests/qemu-x86.sh
          else
            echo "no x86 disk artifact present (DRY_RUN) — running harness in skip mode"
            timeout --signal=TERM --kill-after=30s \
              "${QEMU_TIMEOUT_MINUTES}m" ./v2/tests/qemu-x86.sh
          fi

  # ---------------------------------------------------------------------------
  # Cross-runner build-plan determinism gate (C6b) — PLAN-ONLY, ADVISORY.
  #
  # WHAT: resolves the DRY_RUN mkosi build plan on TWO INDEPENDENT GitHub-hosted
  # runners (ubuntu-24.04 + ubuntu-22.04) for each board, hashes the NORMALIZED
  # plan per board (the SAME task-15 normalization the build-matrix job uses,
  # factored into v2/ci/emit-build-plan-sha.sh), then the gate job asserts the
  # per-board sha256 is IDENTICAL across the two runners (v2/ci/assert-xrunner-
  # parity.sh). A divergent plan sha ⇒ the plan leaked host state ⇒ RED.
  #
  # This EXTENDS the build-matrix job's SAME-host rebuild-parity into a CROSS-host
  # check: rebuild-parity catches time-dependence on one host; this catches
  # HOST-dependence (hostname / arch / toolchain version / an un-normalized
  # absolute path) that a single host can never surface.
  #
  # RUNNER-DIVERSITY CHOICE (documented per task C6b): TWO INDEPENDENT GH-HOSTED
  # RUNNERS of different OS images — ubuntu-24.04 + ubuntu-22.04 (both x86_64).
  # WHY these, and not cross-OS/arch or two containers:
  #   * The v2 build's DRY_RUN plan resolution needs a Linux CONTAINER runtime
  #     (docker/podman — select_build_mode dies without one) + GNU coreutils. macOS
  #     GH runners ship no docker daemon and BSD tools; Windows has no Linux
  #     container path — so neither can run this resolution. True cross-OS runner
  #     diversity is NOT available for this build (this file's header already notes
  #     "The only CI runner is Linux/x86_64").
  #   * ubuntu-24.04 vs ubuntu-22.04 are two genuinely INDEPENDENT runner VMs with
  #     DIFFERENT toolchains (glibc 2.39 vs 2.35, coreutils, python, docker) — real
  #     host diversity that catches toolchain-dependent plan drift — while being
  #     guaranteed-available and fast on ANY repo tier (no arm64/macOS capacity
  #     flakiness — honours the "don't ship a flaky blocking gate" rule).
  #   * The matrix is one line from an arm64 leg (ubuntu-24.04-arm) once that
  #     runner's capacity/cost is confirmed for this repo — the strongest proof, but
  #     not a reliable default today. Two isolated containers were the documented
  #     fallback; not needed — genuine independent runners ARE available here.
  #
  # SCOPE GUARD: this compares the deterministic PLAN / input closure, NOT a dual-
  # host full .raucb image build (CI runs no privileged mkosi build). Full-artifact
  # determinism remains future work — see docs/RELEASE-PROCESS.md §4
  # "CI determinism coverage — cross-runner build-plan gate (C6b)".
  #
  # NON-BLOCKING / PROMOTION NOTE: starts ADVISORY. `continue-on-error` on BOTH jobs
  # is gated on the repo variable XRUNNER_PARITY_BLOCKING — UNSET (default) ⇒
  # continue-on-error true ⇒ the gate annotates red but does NOT fail the workflow
  # run (non-blocking). PROMOTE by setting repo variable XRUNNER_PARITY_BLOCKING=true
  # (and adding `build-plan-xrunner-gate` to the branch-protection required checks)
  # ONCE one green CI run confirms both DRY_RUN legs + the gate complete within the
  # existing CI time budget (the resolve is ~seconds, so this is expected to pass
  # immediately). Do NOT make it a REQUIRED check while it is advisory.
  # ---------------------------------------------------------------------------
  build-plan-xrunner:
    name: build-plan cross-runner sha (${{ matrix.os }} / ${{ matrix.board }}) [plan-only]
    runs-on: ${{ matrix.os }}
    needs: bats
    # Advisory by default; promote to blocking via repo var XRUNNER_PARITY_BLOCKING.
    continue-on-error: ${{ vars.XRUNNER_PARITY_BLOCKING != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        # TWO INDEPENDENT runners × the SAME board matrix as build-matrix above.
        os: [ubuntu-24.04, ubuntu-22.04]
        board: [rock-5b-plus, x86-minipc]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install resolver deps
        run: pip install --quiet jsonschema PyYAML

      - name: Stub sibling-checkout workspace
        run: |
          # fetch-debs asserts srtla/ CeraUI/ are siblings of the workspace root
          # (ARCHITECTURE.md §5). Only image-building-pipeline is checked out here,
          # so point CERALIVE_WORKSPACE at a stub tree — under DRY_RUN no .debs are
          # built from source, so empty dirs satisfy the tripwire.
          ws="${RUNNER_TEMP}/ceralive-ws"
          mkdir -p "${ws}/srtla" "${ws}/CeraUI"
          echo "CERALIVE_WORKSPACE=${ws}" >> "$GITHUB_ENV"

      - name: Resolve DRY_RUN plan → normalized sha sidecar (this runner)
        run: |
          set -euo pipefail
          mkdir -p test-results
          # emit-build-plan-sha.sh runs DRY_RUN=1 INSTALL_BOOT_BSP=0 itself, asserts
          # the container path, strips the abs repo path, and hashes the normalized
          # plan line — the SAME normalization as the build-matrix task-15 step.
          ./v2/ci/emit-build-plan-sha.sh \
            --board "${{ matrix.board }}" \
            --out "test-results/xrunner__${{ matrix.os }}__${{ matrix.board }}.sha256"
          echo "sidecar (runner=${{ matrix.os }}, board=${{ matrix.board }}):"
          cat "test-results/xrunner__${{ matrix.os }}__${{ matrix.board }}.sha256"

      - name: Upload per-runner sidecar
        uses: actions/upload-artifact@v7
        with:
          name: xrunner-plan-${{ matrix.os }}-${{ matrix.board }}
          path: test-results/xrunner__*.sha256
          if-no-files-found: error

  build-plan-xrunner-gate:
    name: build-plan cross-runner determinism gate [plan-only, advisory]
    runs-on: ubuntu-latest
    needs: build-plan-xrunner
    # Advisory by default (see PROMOTION NOTE above); flip to blocking by setting
    # the repo variable XRUNNER_PARITY_BLOCKING=true after a green in-budget run.
    continue-on-error: ${{ vars.XRUNNER_PARITY_BLOCKING != 'true' }}
    steps:
      - uses: actions/checkout@v7

      - name: Download every per-runner sidecar
        uses: actions/download-artifact@v8
        with:
          pattern: xrunner-plan-*
          path: xrunner-sidecars
          merge-multiple: true

      - name: List the collected per-runner sidecars
        run: |
          echo "collected per-runner build-plan sidecars:"
          find xrunner-sidecars -type f -name '*.sha256' | sort | while read -r f; do
            printf '%s: ' "$(basename "$f")"; cat "$f"
          done

      - name: Assert cross-runner plan-hash equality (has teeth — RED on mismatch)
        run: |
          # Explicit hash-equality assertion: for EVERY board, all runners must
          # agree on the normalized plan sha256. --expect-runners 2 makes a missing
          # leg a failure (never a vacuous pass). Exit 1 ⇒ determinism regression.
          ./v2/ci/assert-xrunner-parity.sh xrunner-sidecars --expect-runners 2
