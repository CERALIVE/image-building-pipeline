name: v2 Real-HW candidate gate (RK3588)

on:
  workflow_call:
    inputs:
      board: {type: string, required: true}
      board_ip: {type: string, required: false, default: ''}
      candidate_artifact_name: {type: string, required: true}
      candidate_artifact_digest: {type: string, required: true}
      candidate_raw_filename: {type: string, required: true}
      candidate_raw_sha256: {type: string, required: true}
      candidate_bundle_filename: {type: string, required: true}
      candidate_keyring_filename: {type: string, required: true}
      candidate_loader_filename: {type: string, required: true}
      candidate_loader_sha256: {type: string, required: true}
      candidate_commit: {type: string, required: true}

permissions:
  contents: read

concurrency:
  group: realhw-rk3588-${{ inputs.board }}
  cancel-in-progress: false

jobs:
  realhw:
    if: >-
      github.repository == 'CERALIVE/image-building-pipeline' &&
      github.event_name == 'push' &&
      github.run_attempt == 1 &&
      startsWith(github.workflow_ref, 'CERALIVE/image-building-pipeline/.github/workflows/release.yml@') &&
      (startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/tags/v'))
    environment: image-hardware
    runs-on: [self-hosted, ceralive-rk3588, rock-5b-plus]
    timeout-minutes: 45
    env:
      BOARD: ${{ inputs.board }}
      BOARD_IP: ${{ inputs.board_ip || vars.CERALIVE_RK3588_BOARD_IP }}
      SSH_USER: root
      SSH_PORT: ${{ vars.CERALIVE_RK3588_SSH_PORT || '22' }}
      SERIAL_DEV: ${{ vars.CERALIVE_RK3588_SERIAL_DEV }}
      EXPECTED_MASKROM_ID_SHA256: ${{ vars.CERALIVE_RK3588_MASKROM_ID_SHA256 }}
      UART_SIGNING_KEY: ${{ vars.CERALIVE_RK3588_UART_SIGNING_KEY }}
      ACCESS_ID: gh-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Initialize run-local access path
        run: |
          printf 'ACCESS_DIR=%s\n' \
            "${RUNNER_TEMP}/ceralive-realhw-access-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            >>"${GITHUB_ENV}"
      - name: Reject reruns of immutable hardware candidates
        env:
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          [[ "${RUN_ATTEMPT}" == 1 ]] || {
            echo "::error::Immutable hardware candidates must run once; create a newly named proof branch."
            exit 1
          }
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.candidate_artifact_name }}
          path: candidate
      - id: access
        name: Create bounded run-local SSH identity
        run: |
          set -euo pipefail
          [[ -n "${BOARD_IP}" && -n "${SERIAL_DEV}" ]]
          rm -rf -- "${ACCESS_DIR}"
          install -d -m 0700 "${ACCESS_DIR}"
          ssh-keygen -q -t ed25519 -N '' -C "ceralive-ci-${ACCESS_ID}" -f "${ACCESS_DIR}/id_ed25519"
          chmod 0600 "${ACCESS_DIR}/id_ed25519"
          expires="$(date -u -d '+50 minutes' +%Y%m%d%H%M%SZ)"
          challenge="$(openssl rand -hex 32)"
          echo "::add-mask::${challenge}"
          echo "expires=${expires}" >>"${GITHUB_OUTPUT}"
          echo "host_epoch=$(date -u +%s)" >>"${GITHUB_OUTPUT}"
          echo "challenge=${challenge}" >>"${GITHUB_OUTPUT}"
      - name: Verify, flash, reconnect, and prove media identity
        run: |
          set -euo pipefail
          [[ "${{ inputs.candidate_artifact_digest }}" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "${EXPECTED_MASKROM_ID_SHA256}" =~ ^[0-9a-f]{64}$ ]]
          [[ -f "${UART_SIGNING_KEY}" && ! -L "${UART_SIGNING_KEY}" && \
             "$(stat -c %a "${UART_SIGNING_KEY}")" == 600 ]]
          mkdir -p artifacts
          ./v2/ci/verify-and-flash-candidate.sh \
            --image "candidate/${{ inputs.candidate_raw_filename }}" \
            --bundle "candidate/${{ inputs.candidate_bundle_filename }}" \
            --keyring "candidate/${{ inputs.candidate_keyring_filename }}" \
            --loader "candidate/${{ inputs.candidate_loader_filename }}" \
            --loader-sha256 "${{ inputs.candidate_loader_sha256 }}" \
            --board "${BOARD}" --board-ip "${BOARD_IP}" \
            --candidate-commit "${{ inputs.candidate_commit }}" \
            --image-sha256 "${{ inputs.candidate_raw_sha256 }}" \
            --serial-dev "${SERIAL_DEV}" --uart-log artifacts/first-boot-uart.log \
            --authorized-key "${ACCESS_DIR}/id_ed25519.pub" --access-id "${ACCESS_ID}" \
            --access-expires "${{ steps.access.outputs.expires }}" \
            --host-epoch "${{ steps.access.outputs.host_epoch }}" \
            --ssh-identity "${ACCESS_DIR}/id_ed25519" \
            --challenge "${{ steps.access.outputs.challenge }}" \
            --expected-maskrom-id-sha256 "${EXPECTED_MASKROM_ID_SHA256}" \
            --uart-signing-key "${UART_SIGNING_KEY}" \
            --known-hosts "${ACCESS_DIR}/known_hosts" \
            --authorized-line-out "${ACCESS_DIR}/authorized-line" \
            --identity-out artifacts/candidate-identity.txt
          printf 'artifact_digest=%s\n' '${{ inputs.candidate_artifact_digest }}' >> artifacts/candidate-identity.txt
      - name: Run physical A/B acceptance suite
        run: |
          set -euo pipefail
          BOARD="${BOARD}" BOARD_IP="${BOARD_IP}" SSH_USER="${SSH_USER}" SSH_PORT="${SSH_PORT}" \
            CERALIVE_SUITE_MODE=live MOCK=0 CERALIVE_CI_ACCESS_ID="${ACCESS_ID}" \
            SSH_IDENTITY_FILE="${ACCESS_DIR}/id_ed25519" \
            SSH_KNOWN_HOSTS_FILE="${ACCESS_DIR}/known_hosts" \
            BUNDLE_DIR="${PWD}/candidate" EVIDENCE_DIR="${PWD}/artifacts/realhw" \
            DEV_DEB_DIR="${PWD}/candidate/dev-debs" \
            ./v2/tests/realhw-suite.sh 2>&1 | tee artifacts/realhw-suite.log
          grep -Fx '{"mode":"live","board":"rock-5b-plus","pass":4,"fail":0,"skip":0,"exit":0}' \
            artifacts/realhw/result.json
      - name: Revoke run-local SSH identity
        if: ${{ always() }}
        run: |
          set -u
          mkdir -p artifacts
          status=0
          if [[ -s "${ACCESS_DIR}/authorized-line" && -s "${ACCESS_DIR}/id_ed25519" ]]; then
            ./v2/ci/revoke-ephemeral-ssh.sh \
              --board-ip "${BOARD_IP}" --ssh-user "${SSH_USER}" --ssh-port "${SSH_PORT}" \
              --ssh-identity "${ACCESS_DIR}/id_ed25519" \
              --known-hosts "${ACCESS_DIR}/known_hosts" \
              --authorized-line "${ACCESS_DIR}/authorized-line" --access-id "${ACCESS_ID}" \
              --receipt artifacts/ephemeral-ssh-cleanup.txt || status=$?
          else
            printf 'ephemeral_ssh_access=not-provisioned\naccess_id=%s\n' "${ACCESS_ID}" \
              > artifacts/ephemeral-ssh-cleanup.txt
          fi
          rm -rf -- "${ACCESS_DIR}"
          exit "${status}"
      - name: Upload candidate-bound evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: realhw-${{ inputs.board }}-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
