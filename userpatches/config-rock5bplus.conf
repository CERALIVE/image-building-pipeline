#!/bin/bash
# CeraUI Configuration for Radxa Rock 5B+ (RK3588)
# Full-featured streaming appliance

# Board configuration
BOARD="rock-5b-plus"
BRANCH="vendor"
RELEASE="bookworm"

# Build options for full feature set
BUILD_MINIMAL="yes"
BUILD_DESKTOP="no"
KERNEL_CONFIGURE="no"
INSTALL_HEADERS="no"

# Image configuration
# Autogrow: use Armbian defaults (no fixed image size)

# Kernel configuration for RK3588
KERNEL_ONLY="no"
KERNEL_CONFIGURE="no"
SERIALCON="ttyS2:1500000"

# Bootloader
BOOTLOADER="u-boot"
BOOTSIZE="32"  # 32MB boot partition
BOOTFS_TYPE="fat"

# Additional packages for Rock 5B+ (more features than Orange Pi 5+)
EXTRA_BSP_PACKAGES="
    rockchip-multimedia-config
    mali-g610-firmware
    rkbin-rk3588
    rtl8852be-firmware
    firmware-realtek
"

# RK3588 specific optimizations
RK3588_OPTIMIZATIONS="yes"

# Hardware acceleration and extended features
ENABLE_EXTENSIONS="yes"

# Rock 5B+ has additional connectivity options
EXTRA_BSP_PACKAGES+="
    bluetooth
    bluez
    bluez-tools
"

# Variant-specific configurations
if [[ "${VARIANT}" == "development" ]]; then
    INSTALL_HEADERS="yes"
    EXTRA_BSP_PACKAGES+="
        build-essential
        linux-headers-current-rockchip64
        device-tree-compiler
        gdb
        valgrind
    "
fi

# CeraUI specific environment variables
export DEVICE_TYPE="rock5bplus"
export STREAMING_OPTIMIZED="yes"
export HARDWARE_ACCELERATION="rockchip_mpp"
export VARIANT="${VARIANT:-standard}"
export FULL_FEATURED="yes"  # Rock 5B+ is the full-featured version

echo "Radxa Rock 5B+ configuration loaded for CeraUI full-featured streaming appliance"