#!/bin/bash
# CeraUI Configuration for Orange Pi 5+ (RK3588S)
# Optimized for streaming applications

# Board configuration
BOARD="orangepi5-plus"
BRANCH="vendor"
RELEASE="bookworm"

# Build options optimized for streaming
BUILD_MINIMAL="yes"
BUILD_DESKTOP="no"
KERNEL_CONFIGURE="no"
INSTALL_HEADERS="no"

# Image configuration
# Autogrow: use Armbian defaults (no fixed image size)

# Kernel configuration for RK3588
KERNEL_ONLY="no"
KERNEL_CONFIGURE="no"
SERIALCON="ttyS2:1500000"

# Bootloader
BOOTLOADER="u-boot"
BOOTSIZE="32"  # 32MB boot partition
BOOTFS_TYPE="fat"

# Additional packages for Orange Pi 5+ streaming
EXTRA_BSP_PACKAGES="
    rockchip-multimedia-config
    rockchip-multimedia-config
    mali-g610-firmware
    rkbin-rk3588
"

# RK3588 specific optimizations
RK3588_OPTIMIZATIONS="yes"

# Hardware acceleration
ENABLE_EXTENSIONS="yes"

# Variant-specific configurations
if [[ "${VARIANT}" == "development" ]]; then
    INSTALL_HEADERS="yes"
    EXTRA_BSP_PACKAGES+="
        build-essential
        linux-headers-current-rockchip64
        device-tree-compiler
    "
fi

# CeraUI specific environment variables
export DEVICE_TYPE="orangepi5plus"
export STREAMING_OPTIMIZED="yes"
export HARDWARE_ACCELERATION="rockchip_mpp"
export VARIANT="${VARIANT:-standard}"

echo "Orange Pi 5+ configuration loaded for CeraUI streaming appliance"