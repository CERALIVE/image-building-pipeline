# Orange Pi 5+ (RK3588S) Configuration
# Based on BELABOX recommendations - best choice for HDMI input setups

# Device identification
DEVICE_NAME="Orange Pi 5+"
DEVICE_CODE="orangepi5plus"
SOC="RK3588S"
ARCHITECTURE="arm64"

# Hardware specifications
RAM_SIZE="8GB"  # Available in 4GB, 8GB, 16GB variants
STORAGE_EMMC="optional"  # Can add eMMC module
HDMI_INPUT="yes"
HDMI_INPUT_TYPE="full_size"
WIFI_ONBOARD="yes"
WIFI_CHIP="RTL8821CS"

# USB specifications (critical for modem support)
USB_POWER_TOTAL="3.7A"  # 2.3A shared + 1.5A dedicated
USB_PD_SUPPORT="yes"
USB_PORTS="4"  # 2x USB 2.0, 2x USB 3.0

# M.2 and expansion
M2_SLOT="yes"
M2_SIZE="2280"  # Full size M.2 slot
M2_KEY="M"  # M-key for NVMe/WiFi

# Network interfaces
ETHERNET_PORTS="1"
ETHERNET_SPEED="1000M"

# GPIO and interfaces
GPIO_PINS="40"
I2C_BUSES="yes"
SPI_BUSES="yes"
UART_PORTS="yes"

# Power requirements
POWER_INPUT="5V/4A"
POWER_CONNECTOR="USB-C"
POWER_BARREL="no"

# Image specific settings
BOOTLOADER="u-boot"
BOOTLOADER_TARGET="orangepi-5-plus-rk3588s"
DTB_FILE="rk3588s-orangepi-5-plus.dtb"
KERNEL_IMAGE="Image"

# Partitioning (in MB)
BOOT_PARTITION_SIZE="256"
ROOT_PARTITION_SIZE="6144"  # 6GB for standard variant
TOTAL_IMAGE_SIZE="8192"     # 8GB base image

# Armbian-specific configuration
ARMBIAN_BOARD="orangepi5plus"
ARMBIAN_BRANCH="current"  # Use current stable kernel
ARMBIAN_RELEASE="bookworm"

# Board-specific packages (from Armbian repositories)
BOARD_PACKAGES=(
    "linux-image-current-rockchip64"
    "linux-dtb-current-rockchip64" 
    "armbian-firmware"
    "armbian-bsp-cli-orangepi5plus"
    "rockchip-multimedia-config"
)

# Hardware-specific kernel modules
KERNEL_MODULES=(
    "rockchipdrm"
    "dw_hdmi_rockchip"
    "rockchip_rga"
    "rockchip_mpp"
    "rockchip_vdec"
    "rockchip_venc"
    "rtl8821cs"  # WiFi module
)

# Device tree overlays
DT_OVERLAYS=(
    "rk3588-hdmi-input"
    "rk3588-wifi-rtl8821cs"
    "rk3588-m2-nvme"
)

# USB device rules for streaming
USB_MODEM_SUPPORT="yes"
USB_MODEM_POWER_BUDGET="high"  # Can support power-hungry modems

# Audio configuration
AUDIO_CARD="rockchip-es8388"
AUDIO_OUTPUT="HDMI,3.5mm"
AUDIO_INPUT="3.5mm"

# Video acceleration
VIDEO_ENCODER="rk3588_mpp"
VIDEO_DECODER="rk3588_mpp"
VIDEO_MAX_RESOLUTION="4K@60fps"
VIDEO_FORMATS="H.264,H.265,VP8,VP9"

# Streaming optimizations
STREAMING_OPTIMIZED="yes"
HDMI_CAPTURE_DEVICE="/dev/video0"
HDMI_CAPTURE_DRIVER="rockchip_hdmi_cma"

# Network optimizations for streaming
NETWORK_OPTIMIZATIONS=(
    "net.core.rmem_default=262144"
    "net.core.rmem_max=16777216"
    "net.core.wmem_default=262144"
    "net.core.wmem_max=16777216"
    "net.core.netdev_max_backlog=5000"
)

# Custom firmware requirements
FIRMWARE_FILES=(
    "rockchip/rk3588_ddr_lp4_2112MHz_lp5_2736MHz_v1.16.bin"
    "rockchip/rk3588_bl31_v1.45.elf"
    "rockchip/rk3588_bl32_v1.15.bin"
)

# Boot configuration
BOOT_DELAY="1"
CONSOLE="ttyS2,1500000n8"
ROOT_DEVICE="UUID=\${ROOT_UUID}"

# Installation notes
INSTALLATION_NOTES="
Orange Pi 5+ specific notes:
- Best choice for HDMI input setups according to BELABOX
- HDMI capture interface less affected by EMI than other boards
- Supports full 4K@60fps capture and encoding
- M.2 slot supports 2280 NVMe drives
- Can power most USB modems without hub
- WiFi RTL8821CS requires specific drivers
"
