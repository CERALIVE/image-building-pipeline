# Radxa Rock 5B+ (RK3588) Configuration  
# Based on BELABOX recommendations - best EMI resistance for HDMI input

# Device identification
DEVICE_NAME="Radxa Rock 5B+"
DEVICE_CODE="rock5bplus"
SOC="RK3588"
ARCHITECTURE="arm64"

# Hardware specifications
RAM_SIZE="8GB"  # Available in 4GB, 8GB, 16GB, 32GB variants
STORAGE_EMMC="optional"  # Soldered eMMC available (+$10 for 64GB)
HDMI_INPUT="yes"
HDMI_INPUT_TYPE="full_size"
WIFI_ONBOARD="yes"
WIFI_CHIP="RTL8852BE"

# USB specifications (critical for modem support)
USB_POWER_TOTAL="5.45A"  # Best power delivery of supported boards
# 3.0A for USB-C, 1.45A shared for 2x USB2.0 + 1x USB3.0, 1.0A for bottom USB3.0
USB_PD_SUPPORT="yes"
USB_PORTS="5"  # 2x USB 2.0, 2x USB 3.0, 1x USB-C

# M.2 and expansion slots
M2_SLOT="yes"
M2_SIZE="2242"  # 42mm B-key slot (won't fit full 52mm modems)
M2_KEY="B"      # B-key for cellular modems
M2_MODEM_SUPPORT="yes"  # Designed for 4G/5G modems

# Network interfaces  
ETHERNET_PORTS="1"
ETHERNET_SPEED="1000M"

# GPIO and interfaces
GPIO_PINS="40"
I2C_BUSES="yes"
SPI_BUSES="yes" 
UART_PORTS="yes"

# Power requirements
POWER_INPUT="5V/4A"
POWER_CONNECTOR="USB-C"
POWER_BARREL="no"

# Image specific settings
BOOTLOADER="u-boot"
BOOTLOADER_TARGET="rock-5b-plus-rk3588"
DTB_FILE="rk3588-rock-5b-plus.dtb"
KERNEL_IMAGE="Image"

# Partitioning (in MB)
BOOT_PARTITION_SIZE="256"
ROOT_PARTITION_SIZE="6144"  # 6GB for standard variant
TOTAL_IMAGE_SIZE="8192"     # 8GB base image

# Armbian-specific configuration
ARMBIAN_BOARD="rock-5b-plus"
ARMBIAN_BRANCH="current"  # Use current stable kernel
ARMBIAN_RELEASE="bookworm"

# Board-specific packages (from Armbian repositories)
BOARD_PACKAGES=(
    "linux-image-current-rockchip64"
    "linux-dtb-current-rockchip64"
    "armbian-firmware"
    "armbian-bsp-cli-rock-5b-plus"
    "rockchip-multimedia-config"
    "rtl8852be-firmware"  # WiFi firmware
)

# Hardware-specific kernel modules
KERNEL_MODULES=(
    "rockchipdrm"
    "dw_hdmi_rockchip"
    "rockchip_rga"
    "rockchip_mpp"
    "rockchip_vdec"
    "rockchip_venc"
    "rtl8852be"  # WiFi module
    "rockchip_pcie"  # For M.2 modem support
)

# Device tree overlays
DT_OVERLAYS=(
    "rk3588-hdmi-input"
    "rk3588-wifi-rtl8852be"
    "rk3588-m2-modem-42mm"
    "rk3588-usb-power-delivery"
)

# USB device rules for streaming
USB_MODEM_SUPPORT="yes"
USB_MODEM_POWER_BUDGET="highest"  # Best USB power delivery

# M.2 modem configuration
M2_MODEM_CONFIG="yes"
M2_MODEM_SIZE="42mm"
M2_MODEM_BANDS="4G,5G"
M2_MODEM_SIM_SLOT="yes"
M2_MODEM_SIM_WORKAROUND="required"  # Known issue with SIM detection

# Audio configuration  
AUDIO_CARD="rockchip-es8388"
AUDIO_OUTPUT="HDMI,3.5mm"
AUDIO_INPUT="3.5mm,PDM_MICS"

# Video acceleration
VIDEO_ENCODER="rk3588_mpp"
VIDEO_DECODER="rk3588_mpp" 
VIDEO_MAX_RESOLUTION="4K@60fps"
VIDEO_FORMATS="H.264,H.265,VP8,VP9,AV1"

# Streaming optimizations
STREAMING_OPTIMIZED="yes"
HDMI_CAPTURE_DEVICE="/dev/video0"
HDMI_CAPTURE_DRIVER="rockchip_hdmi_cma"
EMI_RESISTANCE="excellent"  # Best EMI resistance for HDMI capture

# Network optimizations for streaming
NETWORK_OPTIMIZATIONS=(
    "net.core.rmem_default=262144"
    "net.core.rmem_max=16777216"
    "net.core.wmem_default=262144"  
    "net.core.wmem_max=16777216"
    "net.core.netdev_max_backlog=5000"
    "net.ipv4.tcp_congestion_control=bbr"
)

# Custom firmware requirements
FIRMWARE_FILES=(
    "rockchip/rk3588_ddr_lp4_2112MHz_lp5_2736MHz_v1.16.bin"
    "rockchip/rk3588_bl31_v1.45.elf"
    "rockchip/rk3588_bl32_v1.15.bin"
    "rtl_bt/rtl8852bu_fw.bin"  # Bluetooth firmware
)

# Boot configuration
BOOT_DELAY="1"
CONSOLE="ttyS2,1500000n8"
ROOT_DEVICE="UUID=\${ROOT_UUID}"

# Hardware-specific workarounds
HARDWARE_WORKAROUNDS=(
    "sim_card_detection_fix"  # Required for M.2 modem SIM detection
    "hdmi_input_emi_shield"   # EMI shielding configuration
    "usb_power_optimization"  # USB power delivery optimization
)

# Installation notes
INSTALLATION_NOTES="
Radxa Rock 5B+ specific notes:
- Best EMI resistance for HDMI capture (recommended by BELABOX)
- M.2 B-key slot for 42mm cellular modems (no 52mm support)
- SIM card workaround required for M.2 modems
- HDMI input port on side may require cable management consideration
- Best choice for setups requiring both HDMI capture and cellular connectivity
- Micro SD slot under HDMI port - take care not to accidentally eject
- On-board RTL8852BE WiFi with excellent performance
"
