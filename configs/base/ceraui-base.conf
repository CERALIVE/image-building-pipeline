# CeraUI Base Configuration
# Common settings for all devices

# Base system configuration
BASE_OS="armbian"
BASE_RELEASE="bookworm"  # Armbian Debian 12 base for modern package support  
ARMBIAN_VARIANT="minimal"  # Use minimal server variant
ARCHITECTURE="arm64"

# Minimal package sources - as requested
APT_SOURCES_MINIMAL="yes"
SECURITY_UPDATES="yes"
BACKPORTS="no"

# User configuration
DEFAULT_USER="ceraui"
DEFAULT_PASSWORD="changeme123"
ROOT_PASSWORD_LOCKED="yes"
SUDO_ACCESS="yes"

# CeraUI custom repository configuration
CERAUI_REPO_ENABLED="yes"  
CERAUI_REPO_PATH="/etc/opt/ceraui"
CERAUI_REPO_URL="http://repo.ceralive.com/debian"
CERAUI_REPO_KEY_ID="CERALIVE_SIGNING_KEY"

# Core CeraUI packages (distributed as .deb)
CERAUI_PACKAGES=(
    "ceraui"         # Main UI application
    "belacoder"      # Hardware-accelerated encoding with GStreamer
    "srtla"          # SRT Link Aggregation
    "srt"            # Custom SRT implementation
)

# Base system packages (minimal) - many included with Armbian minimal
BASE_PACKAGES=(
    # Essential additions to Armbian minimal
    "ca-certificates"
    "apt-transport-https"
    
    # Network management (if not included)
    "network-manager"
    "dnsmasq"
    
    # Audio system
    "alsa-utils"
    "pulseaudio"
    
    # USB/Device management utilities
    "usbutils"
    "pciutils" 
    "lsof"
    "htop"
    
    # Basic utilities
    "curl"
    "wget"
    "nano"
)

# Streaming and multimedia packages (Armbian may include some)
STREAMING_PACKAGES=(
    # GStreamer core (required for belacoder)
    "gstreamer1.0-tools"
    "gstreamer1.0-plugins-base"
    "gstreamer1.0-plugins-good"
    "gstreamer1.0-plugins-bad"
    
    # Rockchip hardware acceleration (from Armbian repos)
    "gstreamer1.0-rockchip1"  # Armbian provides this
    "rockchip-multimedia-config"
    
    # Audio/Video utilities
    "v4l-utils"
    "media-ctl"  # Media controller utilities for HDMI input
    
    # Minimal FFmpeg (for compatibility if needed)
    "ffmpeg"
)

# Development packages (only for development variant)
DEVELOPMENT_PACKAGES=(
    "build-essential"
    "git"
    "cmake"
    "pkg-config"
    "gdb"
    "strace"
    "tcpdump"
    "iperf3"
)

# Packages to exclude (for minimal builds)
EXCLUDED_PACKAGES=(
    "desktop-*"
    "x11-*"
    "gnome-*"
    "kde-*"
    "libreoffice-*"
    "firefox*"
    "chromium*"
    "games-*"
    "documentation"
    "man-db"
    "info"
)

# Services to enable by default
ENABLED_SERVICES=(
    "systemd-networkd"
    "systemd-resolved" 
    "NetworkManager"
    "pulseaudio"
    "ceraui"           # Main application service
    "ceraui-watchdog"  # Application monitoring
)

# Services to disable (not needed for streaming appliance)
DISABLED_SERVICES=(
    "bluetooth"        # Enable only if needed
    "cups"
    "avahi-daemon"
    "ssh"              # Enable manually if needed
    "apache2"
    "nginx"
    "mysql"
    "postgresql"
)

# System optimizations for streaming
SYSTEM_OPTIMIZATIONS=(
    # Memory management
    "vm.swappiness=10"
    "vm.dirty_ratio=5"
    "vm.dirty_background_ratio=2"
    
    # Network optimizations
    "net.core.rmem_default=262144"
    "net.core.rmem_max=16777216" 
    "net.core.wmem_default=262144"
    "net.core.wmem_max=16777216"
    "net.core.netdev_max_backlog=5000"
    "net.ipv4.tcp_congestion_control=bbr"
    "net.ipv4.tcp_notsent_lowat=16384"
    
    # Scheduler optimizations
    "kernel.sched_autogroup_enabled=0"
    "kernel.sched_migration_cost_ns=5000000"
)

# File system optimizations
FILESYSTEM_OPTIONS="noatime,nodiratime"
TMPFS_SIZE="256M"
LOG_SIZE="100M"  # Limit log file sizes

# Security settings
SECURITY_SETTINGS=(
    "kernel.dmesg_restrict=1"
    "kernel.kptr_restrict=2" 
    "net.ipv4.conf.all.send_redirects=0"
    "net.ipv4.conf.all.accept_redirects=0"
    "net.ipv6.conf.all.accept_redirects=0"
)

# Hardware device access rules
DEVICE_ACCESS_GROUPS=(
    "audio"      # Audio devices
    "video"      # Video devices  
    "dialout"    # Serial/modem devices
    "plugdev"    # USB devices
    "netdev"     # Network management
)

# Custom udev rules required
UDEV_RULES_REQUIRED="yes"

# Localization (minimal)
LOCALE="en_US.UTF-8"
TIMEZONE="UTC"
KEYBOARD_LAYOUT="us"

# Update and maintenance
AUTO_UPDATES="security"  # Only security updates
UPDATE_CHECK_INTERVAL="daily"
LOG_RETENTION="7days"

# Build-specific settings
BUILD_CACHE_ENABLED="yes"
BUILD_PARALLEL_JOBS="auto"  # Based on available CPU cores
BUILD_CLEANUP="yes"  # Clean intermediate files

# Variants configuration
VARIANT_MINIMAL_EXTRA_EXCLUDES=(
    "firmware-linux-nonfree"  # Only if not needed for specific hardware
    "ffmpeg-minimal"
)

VARIANT_DEVELOPMENT_EXTRAS=(
    "openssh-server"
    "rsync"
    "screen"
    "tmux"
    "python3-dev"
    "nodejs"
    "npm"
)

# Custom configuration hooks
PRE_BUILD_HOOKS=()
POST_BUILD_HOOKS=(
    "configure_ceraui_repo"
    "setup_device_permissions"
    "optimize_for_streaming"
    "configure_auto_startup"
)

# Verification and testing
POST_BUILD_TESTS=(
    "test_ceraui_packages"
    "test_hardware_access"
    "test_streaming_stack"
    "test_network_configuration"
)
