# CeraLive component version registry — manually maintained; pipeline reads with graceful fallback
# Keys under image-repos match REPOS=("srtla" "srt" "ceracoder" "CeraUI") in fetch-debs.sh exactly.
# pin: update when cutting a release; ceracoder pin is always HEAD (git short-SHA resolved at build time).

# ── Image-build REPOS (order matches fetch-debs.sh REPOS array) ──────────────

srtla:
  path: srtla
  repo: https://github.com/CERALIVE/srtla
  kind: first-party
  # main no-ff merge commit of feat/merge-irlserver-main-2026-04 (irlserver catch-up)
  pin: aa66a88617010ab69fe01948d8e8163ee53ff703
  channel: stable

srt:
  path: srt
  repo: https://github.com/CERALIVE/srt
  kind: first-party
  pin: latest
  channel: stable

ceracoder:
  path: ceracoder
  repo: https://github.com/CERALIVE/ceracoder
  kind: first-party
  # pin is a git short-SHA resolved at build time via `git rev-parse --short HEAD` (see Makefile:1)
  pin: HEAD
  channel: stable

CeraUI:
  path: CeraUI
  repo: https://github.com/CERALIVE/CeraUI
  kind: first-party
  pin: latest
  channel: stable

# ── Remaining first-party repos ───────────────────────────────────────────────

apt-worker:
  path: apt-worker
  repo: https://github.com/CERALIVE/apt-worker
  kind: first-party
  pin: latest

ceralive-platform:
  path: ceralive-platform
  repo: https://github.com/CERALIVE/ceralive-platform
  kind: first-party
  pin: latest

gstlibuvch264src:
  path: gstlibuvch264src
  repo: https://github.com/CERALIVE/gstlibuvch264src
  kind: first-party
  pin: latest

image-building-pipeline:
  path: image-building-pipeline
  repo: https://github.com/CERALIVE/image-building-pipeline
  kind: first-party
  pin: latest

irl-srt-server:
  path: irl-srt-server
  repo: https://github.com/CERALIVE/irl-srt-server
  kind: first-party
  pin: latest

obs-srtla-sender-plugin:
  path: obs-srtla-sender-plugin
  repo: https://github.com/CERALIVE/obs-srtla-sender-plugin
  kind: first-party
  pin: latest

# ── Local PKI (no remote, no pin) ─────────────────────────────────────────────

cert-work:
  path: cert-work
  repo: null
  kind: local-pki
  pin: null
  # holds PKI secrets; no git remote; never published
