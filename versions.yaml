# CeraLive component version registry — manually maintained; pipeline reads with graceful fallback
# Keys under image-repos match REPOS=("srt" "cerastream" "CeraUI" "srtla-send-rs") in fetch-debs.sh
# exactly. Each key resolves a published device package from apt.ceralive.tv.
# pin: update when cutting a release.
# cerastream is the SOLE streaming engine (ceracoder fully retired 2026-06-11, post boot-parity
# generic-profile PASS — cerastream/docs/notes/boot-parity-results.md; the repo remains on GitHub
# for history). RK3588 hardware-gated profiles now track as cerastream hardware
# validation; Jetson profiles are DEFERRED — not currently planned
# (cerastream/docs/notes/hardware-validation.md), not as a retention condition.

# ── Image-build REPOS (order matches fetch-debs.sh REPOS array) ──────────────

srt:
  path: srt
  repo: https://github.com/CERALIVE/srt
  kind: first-party
  pin: v1.5.5+ceralive.1
  channel: stable

cerastream:
  path: cerastream
  repo: https://github.com/CERALIVE/cerastream
  kind: first-party
  # CalVer (YYYY.MINOR.PATCH) release tags, matching [workspace.package].version in
  # Cargo.toml.
  pin: v2026.7.1
  channel: stable

CeraUI:
  path: CeraUI
  repo: https://github.com/CERALIVE/CeraUI
  kind: first-party
  pin: v2026.6.2
  channel: stable

srtla-send-rs:
  path: srtla-send-rs
  repo: https://github.com/CERALIVE/srtla-send-rs
  kind: first-party
  pin: v3.1.0
  channel: stable

# ── Remaining first-party repos ───────────────────────────────────────────────

srtla:
  path: srtla
  repo: https://github.com/CERALIVE/srtla
  kind: first-party-receiver
  pin: v2026.6.2
  channel: stable

apt-worker:
  path: apt-worker
  repo: https://github.com/CERALIVE/apt-worker
  kind: first-party
  pin: latest

ceralive-platform:
  path: ceralive-platform
  repo: https://github.com/CERALIVE/ceralive-platform
  kind: first-party
  pin: latest

gstlibuvch264src:
  path: gstlibuvch264src
  repo: https://github.com/CERALIVE/gstlibuvch264src
  kind: first-party
  pin: v2026.7.0

image-building-pipeline:
  path: image-building-pipeline
  repo: https://github.com/CERALIVE/image-building-pipeline
  kind: first-party
  pin: latest

irl-srt-server:
  path: irl-srt-server
  repo: https://github.com/CERALIVE/irl-srt-server
  kind: first-party
  pin: latest

# ── Local PKI (no remote, no pin) ─────────────────────────────────────────────

cert-work:
  path: cert-work
  repo: null
  kind: local-pki
  pin: null
  # holds PKI secrets; no git remote; never published
