# CeraLive component version registry — manually maintained; pipeline reads with graceful fallback
# Keys under image-repos match REPOS=("srtla" "cerastream" "CeraUI" "srtla-send-rs") in fetch-debs.sh
# exactly. `srt` is NOT in REPOS: it is a build-time vendored libsrt source (no .deb) — see below.
# pin: update when cutting a release.
# cerastream is the SOLE streaming engine (ceracoder fully retired 2026-06-11, post boot-parity
# generic-profile PASS — cerastream/docs/notes/boot-parity-results.md; the repo remains on GitHub
# for history). RK3588 hardware-gated profiles now track as cerastream hardware
# validation; Jetson profiles are DEFERRED — not currently planned
# (cerastream/docs/notes/hardware-validation.md), not as a retention condition.

# ── Image-build REPOS (order matches fetch-debs.sh REPOS array) ──────────────

srtla:
  path: srtla
  repo: https://github.com/CERALIVE/srtla
  kind: first-party
  # main no-ff merge commit of feat/merge-irlserver-main-2026-04 (irlserver catch-up)
  pin: aa66a88617010ab69fe01948d8e8163ee53ff703
  channel: stable

cerastream:
  path: cerastream
  repo: https://github.com/CERALIVE/cerastream
  kind: first-party
  # CalVer (YYYY.MINOR.PATCH) release tags, matching [workspace.package].version in
  # Cargo.toml; `latest` resolves the newest matching channel release (same as CeraUI).
  pin: latest
  channel: stable

CeraUI:
  path: CeraUI
  repo: https://github.com/CERALIVE/CeraUI
  kind: first-party
  pin: latest
  channel: stable

# ── Remaining first-party repos ───────────────────────────────────────────────

apt-worker:
  path: apt-worker
  repo: https://github.com/CERALIVE/apt-worker
  kind: first-party
  pin: latest

ceralive-platform:
  path: ceralive-platform
  repo: https://github.com/CERALIVE/ceralive-platform
  kind: first-party
  pin: latest

gstlibuvch264src:
  path: gstlibuvch264src
  repo: https://github.com/CERALIVE/gstlibuvch264src
  kind: first-party
  pin: latest

image-building-pipeline:
  path: image-building-pipeline
  repo: https://github.com/CERALIVE/image-building-pipeline
  kind: first-party
  pin: latest

irl-srt-server:
  path: irl-srt-server
  repo: https://github.com/CERALIVE/irl-srt-server
  kind: first-party
  pin: latest

# ── Vendored transport source (NOT a REPOS entry; not its own .deb) ───────────

# srt (CERALIVE fork of Haivision libsrt) is a BUILD-TIME vendored source ONLY —
# cerastream + srtla compile/link against its headers for ABI parity (SONAME
# libsrt.so.1.5). It has no packaging recipe and produces no .deb. Runtime libsrt is
# the SYSTEM `libsrt1.5-openssl` (bookworm main), installed by the runtime OS layer
# (manifests/packages/shared.list) — there is no CERALIVE libsrt fork .deb.
srt:
  path: srt
  repo: https://github.com/CERALIVE/srt
  kind: vendored-transport-src
  pin: latest
  channel: stable

# ── Local PKI (no remote, no pin) ─────────────────────────────────────────────

cert-work:
  path: cert-work
  repo: null
  kind: local-pki
  pin: null
  # holds PKI secrets; no git remote; never published
