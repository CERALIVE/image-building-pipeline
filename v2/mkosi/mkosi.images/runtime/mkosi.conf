# CeraLive v2 — RUNTIME layer (Stage 2)
#
# The OS/product layer: the CeraLive system runtime on top of the board platform
# tree. This layer is IDENTICAL on every architecture (arm + x86 families) — it
# carries ZERO board/SoC assumptions (those all live in the Platform layer). See
# v2/mkosi/LAYER-MAP.md for the full layer contract.
#
# Contents (all arch-independent):
#   * The canonical Task-18 runtime package set — manifests/packages/shared.list
#     (+ the resolved per-family delta, currently empty). This now INCLUDES the
#     OS-update + SRT-transport infra (libsrt1.5-openssl, rauc, u-boot-tools;
#     rauc-hawkbit-updater is a commented placeholder).
#   * System configuration ported from v1 userpatches/customize-image.sh
#     (mkosi.postinst.chroot): ceralive user+groups, deb822 apt sources, the
#     mTLS+GPG apt.ceralive.tv repo, udev hardware-access rules, sysctl, NM,
#     SRTLA source-policy routing, services, first-boot hostname.
#
# PACKAGE SOURCE OF TRUTH = manifests/packages/shared.list. There is NO inline
# hardcoded package list here anymore (Task 19). The orchestrator (lib/orchestrate.sh)
# reads shared.list (the canonical, deduped, parity-checked Task-18 list) and
# forwards it to mkosi.postinst.chroot as $SHARED_PACKAGES; the postinst installs
# exactly that set. lib/parity-check.sh still diffs the built rootfs against
# configs/base/ceraui-base.conf, so any drift fails the parity gate loudly.
#
# NOT here:
#   * HW-accel GStreamer plugin + kernel/DTB/U-Boot/firmware (the BSP, named in the
#     family manifest) → PLATFORM layer (board-specific).
#   * First-party apps (ceracoder, srtla, CeraUI) + the CERALIVE/srt fork .deb →
#     APPLICATION layer (Stage 3, tasks 22-23). They are NOT installed here.

[Config]
Dependencies=platform

[Output]
Format=directory

[Content]
BaseTrees=%O/platform
Bootable=no
WithDocs=no
# Strip gettext catalogs shipped by the shared.list runtime set (single-locale
# C.UTF-8 appliance, Task 19; see base/mkosi.conf + size-notes.md).
RemoveFiles=/usr/share/locale/*,/usr/lib/locale/locale-archive
# Keep apt metadata so the APPLICATION layer (BaseTrees=%O/runtime) can dpkg/apt
# install the first-party .debs (ceracoder/srtla/CeraUI + CERALIVE/srt) on top of
# us in Stage 3 without re-bootstrapping repo metadata.
CleanPackageMetadata=no

# Runtime packages + product/runtime settings + CI secrets reach
# mkosi.postinst.chroot as `--environment NAME` CLI flags passed by
# lib/orchestrate.sh (version-robust across host mkosi 26 and the trixie-builder
# mkosi 25.3, which disagree on whether these live in [Content] or [Build]):
#   SHARED_PACKAGES  — the shared.list (+delta) package set (the canonical list)
#   RELEASE CHANNEL VARIANT BOARD_ID FAMILY  — product/runtime identity
#   APT_CLIENT_*_B64 APT_GPG_PUBLIC_B64       — mTLS + GPG secrets (CI only)
# Nothing secret or board-specific is committed in this file.
