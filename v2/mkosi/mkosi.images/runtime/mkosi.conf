# CeraLive v2 — RUNTIME layer (Stage 1)
#
# The product layer: installs the CeraLive runtime package set on top of the
# board platform tree, then runs the system-configuration port of v1's
# userpatches/customize-image.sh (mkosi.postinst.chroot) — ceralive user+groups,
# apt sources, the mTLS+GPG apt.ceralive.tv repo, first-party .deb install, udev,
# sysctl, NetworkManager, SRTLA source-policy routing and enabled services.
#
# Layering: Dependencies=platform → base+platform build first; BaseTrees=%O/platform
# copies that tree and installs ONLY the packages below on top.
#
# PACKAGE SOURCE OF TRUTH: this list is the Debian-installable half of
# configs/base/ceraui-base.conf (CERAUI/BASE/STREAMING package arrays) plus the
# service-functional extras from customize-image.sh. It is PRODUCT config (the
# same for every board — NOT board logic), and lib/parity-check.sh diffs the built
# rootfs against ceraui-base.conf so any drift here fails the parity gate loudly.
# The Rockchip HW-accel GStreamer (gstreamer1.0-rockchip1, rockchip-multimedia-
# config) and the kernel/DTB/U-Boot/firmware come from the platform layer; the
# first-party ceraui/belacoder/srtla/srt .debs are dpkg-installed in the postinst.

[Config]
Dependencies=platform

[Output]
Format=directory

[Content]
BaseTrees=%O/platform
Bootable=no
WithDocs=no
# (Network for the postinst dpkg/`apt-get -f install` is enabled globally via
# WithNetwork=yes in ../../mkosi.conf — it is a universal, main-image setting.)

Packages=
        # --- ceraui-base.conf BASE_PACKAGES (Debian) ---
        ca-certificates
        apt-transport-https
        network-manager
        dnsmasq
        alsa-utils
        pulseaudio
        usbutils
        pciutils
        lsof
        htop
        curl
        wget
        nano
        # --- ceraui-base.conf STREAMING_PACKAGES (Debian; rockchip1 + multimedia-config are platform/BSP) ---
        gstreamer1.0-tools
        gstreamer1.0-plugins-base
        gstreamer1.0-plugins-good
        gstreamer1.0-plugins-bad
        v4l-utils
        ffmpeg
        # --- customize-image.sh streaming/service parity (functional: bonding, modems, wifi, mdns, time) ---
        gstreamer1.0-plugins-ugly
        gstreamer1.0-libav
        socat
        netcat-openbsd
        iperf3
        i2c-tools
        can-utils
        iotop
        nethogs
        vnstat
        wireless-tools
        wpasupplicant
        hostapd
        avahi-daemon
        libnss-mdns
        cpufrequtils
        modemmanager
        libqmi-utils
        libmbim-utils
        usb-modeswitch
        chrony
        ipcalc
        iproute2

# Product/runtime settings + CI secrets (RELEASE/CHANNEL/VARIANT/BOARD_ID/…,
# APT_CLIENT_*_B64, APT_GPG_PUBLIC_B64) reach mkosi.postinst.chroot as
# `--environment NAME` CLI flags passed by lib/orchestrate.sh — version-robust
# across host mkosi 26 and the trixie-builder mkosi 25.3. Nothing secret or
# board-specific is committed in this file.
