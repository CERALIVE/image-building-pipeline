# CeraLive v2 — APPLICATION layer (Stage 3: REAL INSTALL)
#
# The top of the layer chain: base → platform → runtime → app. This is where the
# first-party CeraLive applications install on top of the finished OS runtime:
#   * cerastream     — streaming engine (SRT encode / dynamic bitrate)
#   * srtla-send-rs — SRTLA sender (srtla_send)
#   * CeraUI         — on-device control plane (web UI + backend; ceralive-device .deb)
# STATUS (Stage 3): mkosi.postinst.chroot installs every staged first-party .deb from
# /opt/ceralive-staging (sysext class: cerastream/srtla-send-rs; appfs class: CeraUI). The
# base image bakes the .debs into the rootfs (docs/partition-contract.md §4); the
# sysext/appfs split is the OTA-delivery backend, not an in-image install difference.
#
# ARCH-NEUTRAL: like the Runtime layer, this layer is identical on every
# architecture. The applications are encoder-agnostic (decision D1) and the only
# arch difference (HW-accel plugin, kernel/BSP) is confined to the Platform layer.
# Adding a new board never touches this file.
#
# Layering: Dependencies=runtime builds base+platform+runtime first; BaseTrees=%O/runtime
# copies that finished tree and the app layer adds ONLY the applications on top.

[Config]
Dependencies=runtime

[Output]
Format=directory

[Content]
BaseTrees=%O/runtime
Bootable=no
WithDocs=no
# Strip gettext catalogs shipped by the first-party app .debs — this is the final
# composed tree, so it is the last chance to purge before assembly seals it
# (single-locale C.UTF-8 appliance, Task 19; see base/mkosi.conf + size-notes.md).
RemoveFiles=/usr/share/locale/*,/usr/lib/locale/locale-archive
# Keep dpkg status for parity checks and field support; the app postinst removes
# apt indexes and downloaded archives after the final install transaction.
CleanPackageMetadata=no
