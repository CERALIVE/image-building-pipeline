# CeraLive v2 — DISK ASSEMBLY layer (Stage 4)
#
# Turns the finished `app` rootfs tree into the actual flashable, partitioned
# disk image: the FROZEN A/B layout from docs/partition-contract.md §3 —
#   (16 MB raw gap) | boot (vfat 256M) | rootfs_a (ext4 4096M)
#                   | rootfs_b (ext4 4096M) | data (ext4, remainder >=2048M)
#
# This is the ONLY Format=disk image in the stack (base/platform/runtime/app are
# all Format=directory trees). See v2/mkosi/LAYER-MAP.md (Assembly layer).
#
# PARTITION GEOMETRY lives in ../../repart/*.conf (systemd-repart format, one file
# per partition). RepartDirectories= points mkosi's internal systemd-repart at
# that single source of truth — sizes/labels/FS are never duplicated here.
#
# Bootable=no: the bootloader (idbloader + U-Boot + ATF) comes from the PLATFORM
# layer and is written to the 16 MB raw gap by the disk assembler, NOT by mkosi.
#
# 16 MB GAP + SINGLE-SLOT: systemd-repart has no `Offset=` key, so it cannot place
# partition 1 at the 16 MB boundary on its own, and RepartDirectories= cannot
# conditionally drop rootfs_b for single-slot media. Both are handled by the
# canonical Stage-4 producer `lib/assemble-disk.sh`, which (a) pre-seeds the GPT
# with sgdisk so `boot` starts at sector 32768 (repart then ADOPTS it, preserving
# the gap), and (b) drops 30-rootfs_b.conf from the active repart set when
# $SINGLE_SLOT_FALLBACK=true. This mkosi sub-image is the mkosi-native layer
# boundary + geometry reference; assemble-disk.sh is the board-faithful producer.
#
# NO A/B flipping / RAUC slot activation / dm-verity here — that is task 26.
#
# Built explicitly in Stage 4 (NOT part of the default `Dependencies=app` chain,
# which stops at the app rootfs tree for the parity gate). Build with:
#   mkosi --image disk ...        (or via lib/assemble-disk.sh, the offline path)

[Config]
Dependencies=app

[Output]
Format=disk

[Content]
# Populate the disk from the finished app rootfs tree (base+platform+runtime+app).
BaseTrees=%O/app
Bootable=no
# Single source of truth for partition sizes / labels / filesystems.
RepartDirectories=../../repart
