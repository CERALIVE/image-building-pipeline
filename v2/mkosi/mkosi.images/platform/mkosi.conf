# CeraLive v2 — PLATFORM layer (Stage 1)
#
# Adds the board/SoC BSP on top of the base tree: hardware-accelerated GStreamer
# (Rockchip MPP) + — when a bootable device build is requested — the kernel,
# device-tree, U-Boot blob and firmware. This is the layer that makes the tree
# board-specific, and it is the ONLY arch-specific layer (runtime + app are
# arch-identical). See v2/mkosi/LAYER-MAP.md.
#
# NOTE: the HW-accel GStreamer plugin lives HERE (kernel-coupled MPP), but the
# The first-party CeraLive SRT runtime does NOT — it is installed in the App layer.
# Keeping it out of platform means a runtime SRT update never forces a board/BSP rebuild.
#
# ZERO hardcoded board logic lives here. Every package NAME is resolved from the
# board+family manifest by lib/resolve.sh and handed in through the environment
# (see Environment= below); the orchestrator (lib/orchestrate.sh) exports them.
# Adding a new board never touches this file.
#
# Layering: Dependencies=base builds the base first; BaseTrees=%O/base copies the
# base tree and installs ONLY the extra BSP packages on top (base kept its apt
# metadata via CleanPackageMetadata=no). We in turn keep our metadata so the
# runtime layer can stack on us.

[Config]
Dependencies=base

[Output]
Format=directory

[Content]
BaseTrees=%O/base
Bootable=no
WithDocs=no
# Strip gettext catalogs shipped by the BSP packages installed on top of base
# (single-locale C.UTF-8 appliance, Task 19; see base/mkosi.conf + size-notes.md).
RemoveFiles=/usr/share/locale/*,/usr/lib/locale/locale-archive
# Keep apt metadata so mkosi.images/runtime (BaseTrees=%O/platform) can install
# the product package set on top of us. The manifest-resolved BSP package NAMES
# + Armbian coordinates + network are passed to mkosi.postinst.chroot as CLI
# flags by lib/orchestrate.sh (--environment NAME / --with-network=yes) — that
# is version-robust across the host mkosi 26 and the trixie-builder mkosi 25.3,
# which disagree on whether these settings live in [Content] or [Build].
CleanPackageMetadata=no
# After the BSP packages are installed, integrate the A/B bootloader: stage
# platform/boot into the tree and install the RAUC bootloader=custom backend +
# state helper + board-keyed system.conf (mkosi.finalize, host-side staging like
# base/mkosi.finalize). Gated on arm64 + INSTALL_BOOT_BSP=1 inside the script.
FinalizeScript=mkosi.finalize
