# CeraLive v2 — BASE OS layer (Stage 1)
#
# The shared foundation every platform family builds on: a minimal Debian
# bookworm rootfs TREE. Distribution / Release / Architecture / Repositories are
# inherited from ../../mkosi.conf (global), so this stays arch-parametric.
#
# Output = Format=directory (NOT a disk). The base is a composable tree that the
# upper layers add packages to (see v2/mkosi/LAYER-MAP.md):
#   platform -> HW-accel GStreamer + kernel/U-Boot/DTB/firmware (the only arch-specific layer)
#   runtime  -> shared.list package set + rauc/u-boot-tools + system config
#   app      -> first-party cerastream/srtla/CeraUI + CERALIVE/srt fork .deb
# Only the final assembly step turns the merged tree into a Format=disk image with
# the real partition layout + dm-verity + A/B. Keeping each layer Format=directory
# keeps outputs small and composable.
#
# MINIMAL means minimal. ONLY systemd, udev, openssh-server, dbus. NO kernel,
# NO board/BSP packages, NO GStreamer, NO libsrt, NO cerastream/srtla/CeraUI —
# those all belong to the platform/runtime/app layers, never the base.

[Output]
Format=directory

[Content]
# BaseTrees= layering REQUIREMENT (mkosi man, BaseTrees=): a tree used as a base
# must still carry the package-manager databases + repo metadata, otherwise the
# platform/runtime layers stacked on top cannot resolve/install their extra
# packages. `auto` would strip them (apt is present) → keep them explicitly so
# `mkosi.images/platform` (BaseTrees=%O/base) can `apt-get install` the BSP and
# `mkosi.images/runtime` (BaseTrees=%O/platform) can install the product set.
CleanPackageMetadata=no
# Minimal base package set — the irreducible foundation. Nothing board- or
# app-specific here.
#
# apt + ca-certificates are load-bearing in the base (not optional): the
# platform/runtime .postinst.chroot scripts run INSIDE the image and call
# `apt-get` to install the BSP (from https://apt.armbian.com) and the shared.list
# product set. mkosi's Debian bootstrap does NOT pull apt (it is priority
# "important", not "essential"), and the base comment above about keeping apt
# metadata is only meaningful if the apt client itself is present. ca-certificates
# must also be here, before runtime installs it, so the platform layer's HTTPS
# Armbian fetch can validate TLS.
Packages=
        systemd
        udev
        openssh-server
        dbus
        apt
        ca-certificates
        kmod
# Bootability (bootloader/UKI) is added by the platform layer + assembly step,
# not the base. The base is just a rootfs tree.
Bootable=no
# Appliance image: drop man pages / docs to keep the base lean.
WithDocs=no
# Single-locale appliance (Task 19). The device speaks ONLY C.UTF-8 — there is no
# interactive shell user picking a language, and CeraUI is its own web frontend.
# Locale=/LocaleMessages= pin /etc/locale.conf to C.UTF-8 (glibc 2.36 ships C.UTF-8
# built-in, so NO locale-gen / locale-archive is needed). RemoveFiles then purges
# every gettext message catalog (/usr/share/locale/*) and any stale compiled
# locale-archive that a transitively-pulled `locales` package might have left —
# C.UTF-8 keeps working because it carries no .mo catalog (programs fall back to
# their built-in English msgids). Each upper layer repeats the RemoveFiles glob so
# catalogs shipped by ITS new packages are stripped too (RemoveFiles runs per-image
# at the end of that image's build). See v2/docs/size-notes.md.
Locale=C.UTF-8
LocaleMessages=C.UTF-8
RemoveFiles=/usr/share/locale/*,/usr/lib/locale/locale-archive
# Create the CeraLive runtime USER in the BASE OS layer. The sysext app layer
# (task 22) overlays only /usr+/opt and cannot add a user, so the `ceralive`
# account must exist in the sealed base tree before the app extension runs as
# it. mkosi.finalize stages v2/mkosi/customize + lib/common.sh into the tree and
# runs `customize/run-all.sh base` (→ users.sh) via mkosi-chroot.
FinalizeScript=mkosi.finalize
