# CeraLive v2 — BASE OS layer (Stage 1)
#
# The shared foundation every platform family builds on: a minimal Debian
# bookworm rootfs TREE. Distribution / Release / Architecture / Repositories are
# inherited from ../../mkosi.conf (global), so this stays arch-parametric.
#
# Output = Format=directory (NOT a disk). The base is a composable tree that the
# platform layer (kernel/U-Boot/DTB) and runtime layer (GStreamer/libsrt/app
# .debs) add packages to; only the final assembly step turns the merged tree into
# a Format=disk image with the real partition layout + dm-verity + A/B. Keeping
# each layer Format=directory keeps outputs small and composable.
#
# MINIMAL means minimal. ONLY systemd, udev, openssh-server, dbus. NO kernel,
# NO board/RK3588 packages, NO GStreamer, NO ceracoder/srtla/CeraUI — those all
# belong to the platform/runtime layers, never the base.

[Output]
Format=directory

[Content]
# BaseTrees= layering REQUIREMENT (mkosi man, BaseTrees=): a tree used as a base
# must still carry the package-manager databases + repo metadata, otherwise the
# platform/runtime layers stacked on top cannot resolve/install their extra
# packages. `auto` would strip them (apt is present) → keep them explicitly so
# `mkosi.images/platform` (BaseTrees=%O/base) can `apt-get install` the BSP and
# `mkosi.images/runtime` (BaseTrees=%O/platform) can install the product set.
CleanPackageMetadata=no
# Minimal base package set — the irreducible foundation. Nothing board- or
# app-specific here.
Packages=
        systemd
        udev
        openssh-server
        dbus
# Bootability (bootloader/UKI) is added by the platform layer + assembly step,
# not the base. The base is just a rootfs tree.
Bootable=no
# Appliance image: drop man pages / docs to keep the base lean.
WithDocs=no
