[Unit]
# Task 15 / SC3 — order nginx AFTER the first-boot cert generation and make it a
# hard dependency: ceralive-tls-firstboot.service is a Type=oneshot
# RemainAfterExit unit, so Requires= here means nginx will NOT start until the
# per-device key+cert exist at /data/ceralive/tls/. Without this, nginx could race
# ahead, find no cert for `listen 443 ssl`, and fail to start the TLS front.
#
# Installed by postinst-lib.sh::setup_tls_proxy to
# /etc/systemd/system/nginx.service.d/10-ceralive-tls.conf.
Requires=ceralive-tls-firstboot.service
After=ceralive-tls-firstboot.service
