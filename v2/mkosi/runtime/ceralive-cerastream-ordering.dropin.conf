[Unit]
# Boot-ordering hint ONLY — never a hard dependency. ceralive.service's boot step
# initPipelines() connects to cerastream's control socket exactly once; if cerastream
# isn't up yet the connection fails permanently for that boot. Confirmed live:
# cerastream.service started ~2 minutes AFTER ceralive.service in one boot instance,
# and `systemctl show ceralive -p After` had NO mention of cerastream.service at all.
# After= makes systemd start ceralive.service only once cerastream.service has begun
# activating, shrinking that race window.
#
# ORDERING-ONLY, by deliberate design: this is `After=`, NEVER `Requires=`. A hard
# requirement would tie ceralive.service's fate to cerastream's — but ceralive.service
# MUST still boot and serve its "engine unavailable" degraded state (CeraUI's fail-soft
# boot design, helpers/boot-guard.ts::guardNonCritical) if cerastream is ever genuinely
# absent or masked. After= referencing a unit that isn't in the boot transaction is a
# harmless no-op, so this is safe on any build/slot even when cerastream is missing.
#
# A separate CeraUI-side retry/resilience fix for the one-shot connect lands in parallel;
# this drop-in is the systemd-level ordering half. Installed by
# postinst-lib.sh::setup_cerastream_ordering to
# /etc/systemd/system/ceralive.service.d/30-cerastream-ordering.conf (additive to the
# ceralive.service unit shipped by the CeraUI .deb, like 10-data-persistence.conf and
# 20-paseto-public-key.conf).
After=cerastream.service
