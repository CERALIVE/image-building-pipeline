# CeraLive — rauc-hawkbit-updater config TEMPLATE (Stage 7, task 41).
#
# This is the BAKED-IN template at /etc/rauc-hawkbit-updater/config.conf. It is a
# template ONLY: every per-device secret is a @PLACEHOLDER@ — there is NO real
# token, server or target name in the image. On first boot, the provisioning unit
# (ceralive-hawkbit-provision.service → /usr/local/sbin/ceralive-hawkbit-provision)
# reads the operator-supplied enrollment data from /data/ceralive/hawkbit.conf
# (on the data partition, NEVER baked) and RENDERS the effective config —
# placeholders filled with the real per-device values — to:
#       /data/ceralive/hawkbit-updater/config.conf   (mode 0600, on /data)
# The systemd unit runs the updater with `-c <that /data path>`, so the running
# config (and the token it carries) lives only on /data, never in the read-only
# rootfs slot and never in git. See README.md for the full enrollment strategy.
#
# WHY /data for the effective config + downloads: a RAUC A/B slot swap overwrites
# the active rootfs, so anything under /etc or /var in a slot is lost on update.
# /data (PARTLABEL=data) is the single source of truth for mutable state
# (partition-contract §6). The token and downloaded bundle therefore live on /data.
#
# HEALTHCHECK GATE (task 29) — the updater does NOT confirm the slot:
#   rauc-hawkbit-updater 1.4 only INSTALLS a bundle (via RAUC's D-Bus
#   InstallBundle). It has NO `mark-good`/auto-confirm capability, so it CANNOT
#   bypass the healthcheck gate. RAUC marks the freshly-installed slot primary with
#   a bounded boot-attempts count (system.conf, task 26/27); on the next boot
#   ceralive-healthcheck.service (task 29) is the SOLE caller of `rauc mark-good`,
#   and rolls the slot back if streaming health is not proven.
#   `post_update_reboot = false` keeps the reboot under CeraLive's control (the
#   docs warn it is an immediate UNCLEAN reboot) so the gate stays authoritative.

[client]
# IP/hostname[:port] of the private hawkBit DDI endpoint. Provisioned per-device
# from /data/ceralive/hawkbit.conf (HAWKBIT_SERVER) — never baked.
hawkbit_server            = @HAWKBIT_SERVER@
# Private hawkBit is fronted by TLS (reverse proxy / VPN / Cloudflare Tunnel,
# task 40). Keep verification ON; only an operator may relax it via hawkbit.conf.
ssl                       = @HAWKBIT_SSL@
ssl_verify                = @HAWKBIT_SSL_VERIFY@
# Per-device DDI authentication token (target token). Rendered from the token
# stored at /data/ceralive/hawkbit-token. A tenant-wide gateway_token line is
# substituted here instead when the operator provisions one (see provision script).
@HAWKBIT_AUTH_LINE@
# hawkBit tenant. Defaults to DEFAULT.
tenant_id                 = @HAWKBIT_TENANT@
# Unique controller id this device registers as. Defaults to the device hostname.
target_name               = @HAWKBIT_TARGET_NAME@
# Bundle download target — on the DATA partition, NOT the rootfs slot (task 41
# MUST-NOT: never store downloads in rootfs). The directory is created on /data by
# ceralive-migrate-data at boot; the marker-clear path unit watches *.raucb here.
bundle_download_location  = /data/ceralive/rauc-downloads/bundle.raucb
# CeraLive owns the reboot (healthcheck-gated mark-good is authoritative). NEVER
# let the updater reboot — the docs warn it is an immediate unclean reboot.
post_update_reboot        = false
# Conservative polling/backoff for field-deployed, often-metered LTE links.
retry_wait                = 300
connect_timeout           = 20
timeout                   = 60
log_level                 = message

[device]
# Mandatory section: key/value attributes reported to hawkBit at DDI registration,
# used for rollout target filtering. `compatible` mirrors the device's RAUC
# `compatible` (read from /etc/rauc/system.conf at provision time) so a rollout's
# `attribute.compatible==ceralive-<family>` filter (fleet/hawkbit/provision.sh,
# task 40) only ever offers a matching-board bundle — defense in depth alongside
# RAUC's own foreign-bundle guard (`rauc install` rejects a mismatched compatible).
compatible                = @COMPATIBLE@
