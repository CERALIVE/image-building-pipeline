# CeraLive v2 — MediaMTX RTMP-ingest gateway recipe (build-time PIN).
#
# Declarative input to postinst-lib.sh::setup_rtmp_gateway. KEY=value only
# (sourced under strict mode — no logic, no side effects here), mirroring the
# app/*.sysext.conf descriptor convention.
#
# THIS FILE IS THE PIN. setup_rtmp_gateway fetches the exact tarball named by
# MEDIAMTX_VERSION for the target architecture, then verifies its sha256 against
# the per-arch pin below and FAILS THE BUILD CLOSED on any mismatch. Bumping
# MediaMTX = bump MEDIAMTX_VERSION here AND replace BOTH checksums with the new
# release's real values (see the fetch/verify block in setup_rtmp_gateway).
#
# Upstream: https://github.com/bluenviron/mediamtx (Apache-2.0). Assets are the
# official per-arch release tarballs `mediamtx_<ver>_linux_<arch>.tar.gz`, each
# containing a single static Go binary `mediamtx` + `mediamtx.yml` + `LICENSE`.
#
# shellcheck shell=bash
# shellcheck disable=SC2034,SC1083  # consumed externally by setup_rtmp_gateway after `source`; {ver}/{arch} braces are literal placeholders

# Pinned release tag (the GitHub release / asset version token).
MEDIAMTX_VERSION=v1.19.2

# Base URL for the release assets. {ver} is substituted with MEDIAMTX_VERSION.
MEDIAMTX_URL_TEMPLATE=https://github.com/bluenviron/mediamtx/releases/download/{ver}/mediamtx_{ver}_linux_{arch}.tar.gz

# Per-arch sha256 pins of the release TARBALL (mediamtx_v1.19.2_linux_<arch>.tar.gz).
# Recorded 2026-07-02 from the official bluenviron/mediamtx v1.19.2 release.
#   amd64 tarball: 26676262 bytes → mediamtx binary 54125337 bytes (~51.6 MiB)
#   arm64 tarball: 28623116 bytes → mediamtx binary 62164043 bytes (~59.3 MiB)
MEDIAMTX_SHA256_amd64=f9c601cc303ceca8fad2883917b022882672c5bc56311e92dbceb16e5f20c60c
MEDIAMTX_SHA256_arm64=562f419912a8668c18216a9e8c95359ec82fbb754e4a44e2953ef62b98eec688
