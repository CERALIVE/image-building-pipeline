# CeraLive cert-rotation configuration (Stage 7, task 42).
#
# Baked into the FIRST image at /etc/ceralive/cert-rotation.conf. Read by
# /usr/local/bin/cert-rotation.sh. Defaults below ARE the production values; this
# file exists so an operator can audit (and, in a recovery scenario, override) the
# paths and the expiry-warning threshold without editing the script.
#
# THE TRUST MODEL (cert-work/rauc/README.txt, decisions.md Stage 0g):
#   * ROOT_CA is the IMMUTABLE root baked into the device RAUC keyring at flash
#     time. RAUC has NO through-channel root swap — a new root = physical reflash.
#     cert-rotation NEVER writes ROOT_CA; it only VERIFIES against it.
#   * The intermediate + leaf CAN rotate. A signed cert-rotation .raucb (built by
#     lib/build-cert-rotation-bundle.sh, signed with the CURRENT leaf) delivers the
#     new intermediate.pem + leaf.pem into CERT_INCOMING_DIR; cert-rotation.sh then
#     verifies the new chain (leaf -> intermediate -> ROOT_CA) and, only if that
#     passes, atomically activates them at INTERMEDIATE_CERT / LEAF_CERT.
#
# Everything lives on /data (PARTLABEL=data) so it SURVIVES an A/B OS update — the
# rootfs slots are wiped on every RAUC OS install, /data is not (partition-contract
# §6). NEVER point these at a rootfs path.

# Persistent cert store on the shared /data partition.
CERT_DIR=/data/ceralive/certs

# Where a cert-rotation bundle's install hook drops the candidate certs. The
# service is a no-op when this directory holds no candidate (ConditionPathExists).
CERT_INCOMING_DIR=/data/ceralive/certs/incoming

# The IMMUTABLE trust anchor: the device RAUC keyring (root CA only, baked in at
# first flash). cert-rotation verifies every candidate intermediate/leaf to THIS
# and refuses anything that does not chain to it. It is never modified here.
ROOT_CA=/etc/rauc/ceralive-keyring.pem

# The activated (in-use) rotated certs. Other on-device tooling that needs the
# current signing chain (and the fleet expiry monitor) read these paths.
INTERMEDIATE_CERT=/data/ceralive/certs/intermediate.pem
LEAF_CERT=/data/ceralive/certs/leaf.pem

# Pre-expiry warning threshold (days). The weekly cert-rotation-expiry.timer logs a
# WARNING to journald when an activated cert expires in fewer than this many days,
# so the fleet operator can push a rotation bundle BEFORE expiry (policy: rotate
# leaf <=2y, intermediate <=5y — well inside this warning window).
EXPIRY_WARN_DAYS=90
