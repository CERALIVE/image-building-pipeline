# CeraLive RAUC system.conf — A/B rootfs slots + root-CA keyring (Stage 4, task 26).
#
# WHO INSTALLS THIS, AND WHEN (two paths, ONE result):
#   * arm64 device build (INSTALL_BOOT_BSP=1): platform/boot/install-boot.sh
#     (run from platform/mkosi.finalize) REGENERATES /etc/rauc/system.conf
#     board-aware — compatible=ceralive-${FAMILY}, and the [slot.rootfs.1] B slot
#     is omitted on single-slot media (partition-contract §4). That generated file
#     is authoritative on real hardware; this static file is NOT copied over it.
#   * everything else (x86 / parity / no-boot-BSP build): customize/rauc-setup.sh
#     (and its inline twin in mkosi.images/runtime/mkosi.postinst.chroot) installs
#     THIS file verbatim as the fallback, substituting @COMPATIBLE_STRING@.
#
# Either way the device ends up with exactly one /etc/rauc/system.conf describing
# the same A/B model. Keep this file in sync with install-boot.sh's heredoc.
#
# WHY bootloader=custom (decision D3): the staged RK3588 vendor U-Boot is built
# ENV_IS_NOWHERE — fw_setenv does not persist — so RAUC's stock bootloader=uboot
# backend cannot drive BOOT_ORDER / bootcount. We keep RAUC's exact A/B+bootcount
# model but store the state in a text file on the FAT boot partition, driven by
# ceralive-rauc-boot-adapter (the [handlers] custom backend below).

[system]
# @COMPATIBLE_STRING@ is substituted at install time (orchestrator sets it from
# the manifest family+board: ceralive-${FAMILY}; arch-neutral fail-closed default
# ceralive-unknown when nothing sets it — the runtime layer names no SoC). A bundle whose
# `compatible` differs is REJECTED by `rauc install` — this is the foreign-bundle
# guard. It MUST match the compatible baked into the signed .raucb.
compatible=@COMPATIBLE_STRING@
bootloader=custom
# Boot attempts per slot before the custom backend / boot.scr declare a slot bad
# and roll back. Mirrors CERALIVE_BOOT_ATTEMPTS used by ceralive-boot-state.
boot-attempts=3

[handlers]
# Bookworm RAUC 1.8 reads rauc.slot= itself and delegates the four state/primary
# operations to this script. RAUC 1.11+ may also call get-current. BOOT_ORDER and
# per-slot attempt counters live on the FAT boot partition because the staged
# vendor U-Boot has no persistent fw_setenv (decision D3).
bootloader-custom-backend=/usr/lib/rauc/ceralive-rauc-boot-adapter

[keyring]
# The IMMUTABLE root CA baked in at first flash (cert-work/rauc/root-ca.pem).
# Bundles embed leaf+intermediate (chain.pem); the device builds
# leaf -> intermediate -> THIS root at verify time. RAUC has no through-channel
# root swap — a new root means a full reflash (cert-work/rauc/README.txt).
path=/etc/rauc/ceralive-keyring.pem

# Symmetric A/B rootfs slots. Referenced by PARTLABEL per the FROZEN partition
# contract (§3) — NEVER by FS-UUID (a slot update changes the UUID, and the two
# rootfs labels are not unique across A/B).
[slot.rootfs.0]
device=/dev/disk/by-partlabel/rootfs_a
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/disk/by-partlabel/rootfs_b
type=ext4
bootname=B

# Cert-rotation target (Stage 7, task 42). A signed cert-rotation .raucb carries a
# new intermediate+leaf as the `certs` image, installed by the bundle's `install`
# hook (RAUC does not write this slot itself) into /data/ceralive/certs/incoming;
# cert-rotation.service then re-verifies leaf -> intermediate -> THIS keyring's root
# before activating them. The device download (.prev backup) lives on /data so a
# rotation NEVER touches a rootfs slot and needs NO reflash. The placeholder device
# is a regular file on /data, seeded at first boot by ceralive-migrate-data. This
# slot is baked into the FIRST image so rotation is possible from first flash.
[slot.certs.0]
device=/data/ceralive/certs/.rauc-certs-slot
type=raw
