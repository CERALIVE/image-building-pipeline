[Service]
# Defense-in-depth mDNS reliability. Stock Debian's avahi-daemon.service ships NO
# Restart= directive, so ANY signal or crash leaves avahi-daemon — and therefore
# <hostname>.local mDNS — permanently DEAD until the next reboot. Confirmed live on
# real hardware: the daemon was killed by SIGUSR2 (journalctl -u avahi-daemon:
# "Main process exited, code=killed, status=12/USR2" -> "Failed with result
# 'signal'"), and `systemctl show avahi-daemon -p NRestarts` read NRestarts=0 —
# proving no restart policy was active. Operators reach the device by
# <hostname>.local (docs/FIRST-BOOT.md + the deterministic first-boot unique-hostname
# service), so mDNS staying up is a device-reliability requirement.
#
# The signal SOURCE (a CeraUI udev rule's overly-broad `pkill -f ceralive` catching
# avahi-daemon) is the ROOT-CAUSE fix, handled separately in the CeraUI repo. This
# additive drop-in is the systemd-level DEFENSE-IN-DEPTH layer: it makes the daemon
# self-heal after ANY future non-clean exit, not just this one cause. `on-failure`
# (not `always`) so a deliberate `systemctl stop` still stops it.
#
# Installed by postinst-lib.sh::setup_avahi_restart to
# /etc/systemd/system/avahi-daemon.service.d/10-ceralive-restart.conf.
Restart=on-failure
RestartSec=2
