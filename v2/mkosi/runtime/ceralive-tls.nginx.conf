# CeraLive TLS front — terminate HTTPS on 443 and reverse-proxy to the CeraUI
# backend on 127.0.0.1:80 (Task 15, SC3).
#
# Committed canonical artifact (single source of truth under v2/mkosi/runtime/).
# Installed by postinst-lib.sh::setup_tls_proxy to
# /etc/nginx/sites-available/ceralive-tls.conf and symlinked into sites-enabled/.
#
# SC3 — this server adds an HTTPS path ONLY. Port 80 is LEFT to the backend, which
# binds it directly; nginx does NOT listen on 80 and there is deliberately NO
# 80->443 redirect. (setup_tls_proxy also removes the stock nginx sites-enabled/
# default site so nginx never grabs port 80.)
#
# The certificate is a per-device SELF-SIGNED cert generated on first boot by
# ceralive-tls-firstboot.service into /data (survives reboots + A/B OTA slot
# swaps). A browser reaching https://<device>.local WILL show a "self-signed /
# not secure" warning the first time — this is expected and honest for a headless
# appliance on a private LAN with no public DNS and no ACME path (SC3: no ACME/
# Let's Encrypt, no mTLS). Click through once to reach the UI over TLS.

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate     /data/ceralive/tls/ceralive.crt;
    ssl_certificate_key /data/ceralive/tls/ceralive.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:CeraLiveTLS:1m;
    ssl_session_timeout 10m;

    # CeraUI drives the device over a same-origin WebSocket (telemetry + RPC). The
    # three headers below are MANDATORY (EC6): without the Upgrade/Connection pair
    # on HTTP/1.1, nginx answers the WS handshake with 400 and the UI never
    # connects. proxy_pass keeps the backend on plain HTTP/80 (TLS terminates here).
    location / {
        proxy_pass http://127.0.0.1:80;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Device telemetry WebSockets are long-lived; don't let the proxy reap an
        # idle-but-healthy stream. Buffering off keeps server-push frames prompt.
        proxy_buffering     off;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
