# CeraLive x86 A/B boot selector — RAUC-NATIVE GRUB config SOURCE TEMPLATE.
#
# Rendered to grub.cfg by install-x86-grub.sh (only the @CONSOLE@ placeholder is
# substituted at build time). The rendered grub.cfg lives on the EFI System
# Partition next to grubenv and BOOTX64.EFI (the removable-path GRUB binary), e.g.
# /EFI/BOOT/grub.cfg, so GRUB's `load_env` (which reads $prefix/grubenv) and
# RAUC's stock grub backend (grub-editenv, on-device) read+write the SAME state.
#
# THIS IS RAUC's BUILT-IN `bootloader=grub` SELECTOR (the meta-rauc-qemux86
# reference pattern), NOT the CeraLive RK3588 multi-attempt countdown. The RAUC
# grub backend keeps three vars per A/B set in grubenv:
#   ORDER="A B"   slot bootnames in priority order (head = primary)
#   A_OK / B_OK   1 = slot is known-good (bootable); 0 = bad (rolled back)
#   A_TRY / B_TRY 0 = not yet attempted this cycle; 1 = attempted, awaiting confirm
#
# ALGORITHM (twin of RAUC's grub.conf.in):
#   1. load_env reads ORDER + per-slot OK/TRY from grubenv (defaults below are the
#      safe fallback if grubenv is missing/partial — both slots bad until RAUC seeds).
#   2. pick the FIRST slot in ORDER with OK=1 AND TRY=0 (the primary).
#   3. mark that slot TRY=1 and save_env — an OS that boots but never confirms
#      itself (RAUC `mark-good` -> OK=1 TRY=0) leaves TRY=1, so the NEXT boot's
#      step 2 skips it and the selector falls through to the next slot in ORDER:
#      automatic rollback. No GRUB arithmetic is needed (boolean OK/TRY, not a
#      countdown), which is exactly why the RAUC-native backend fits GRUB cleanly.
#   4. boot /vmlinuz + /initrd.img from the chosen rootfs slot, root=PARTLABEL.
#
# Kernel + initrd ride INSIDE the rootfs slot (Debian /vmlinuz + /initrd.img
# symlinks track the current kernel), so `search --label` sets root to that ext4
# slot by its filesystem label (mkfs.ext4 -L rootfs_a|rootfs_b in disk assembly).

insmod part_gpt
insmod fat
insmod ext2
insmod search
insmod search_label
insmod search_fs_file
insmod test
insmod echo
insmod loadenv
insmod linux

set timeout=1
set default=0

# board serial console (from the family manifest serial_console, ':' -> ',')
set cera_console="@CONSOLE@"

# --- A/B state defaults: fail-closed (both slots NOT-OK) until grubenv seeds them.
#     load_env overrides these from the on-ESP grubenv that disk assembly seeded
#     (ORDER="A B", both OK=1 TRY=0) and that RAUC rewrites on install/mark-good.
set ORDER="A B"
set A_OK=0
set A_TRY=0
set B_OK=0
set B_TRY=0
load_env
echo "CeraLive A/B (RAUC grub): ORDER=${ORDER} A_OK=${A_OK} A_TRY=${A_TRY} B_OK=${B_OK} B_TRY=${B_TRY}"

# --- pick the first slot in ORDER that is OK and not yet tried this cycle.
set cera_slot=""
set cera_default=0
for s in ${ORDER}; do
  if [ -z "${cera_slot}" ]; then
    if [ "${s}" = "A" ]; then
      if [ "${A_OK}" = "1" -a "${A_TRY}" = "0" ]; then
        set cera_slot="A"
        set cera_default=0
        set A_TRY=1
        save_env A_TRY
      fi
    fi
    if [ "${s}" = "B" ]; then
      if [ "${B_OK}" = "1" -a "${B_TRY}" = "0" ]; then
        set cera_slot="B"
        set cera_default=1
        set B_TRY=1
        save_env B_TRY
      fi
    fi
  fi
done

# --- both slots exhausted/bad -> last-resort boot the head of ORDER (no TRY write,
#     nothing left to spend). Lets a fully-failed device still attempt a boot.
if [ -z "${cera_slot}" ]; then
  for s in ${ORDER}; do
    if [ -z "${cera_slot}" ]; then
      set cera_slot="${s}"
      if [ "${s}" = "A" ]; then set cera_default=0; fi
      if [ "${s}" = "B" ]; then set cera_default=1; fi
    fi
  done
  echo "CeraLive: no OK/untried slot — last-resort booting ${cera_slot}"
fi

set default="${cera_default}"
echo "CeraLive: booting slot ${cera_slot}"

# --- auto entries (default selects the slot chosen above). search by ext4 FS label
#     (rootfs_a / rootfs_b) set in disk assembly; kernel/initrd ride in the slot.
menuentry "CeraLive (slot A)" --id ceralive-a {
  search --no-floppy --label --set=root rootfs_a
  linux /vmlinuz root=/dev/disk/by-partlabel/rootfs_a rootwait rw console=${cera_console} cera_slot=A
  initrd /initrd.img
}
menuentry "CeraLive (slot B)" --id ceralive-b {
  search --no-floppy --label --set=root rootfs_b
  linux /vmlinuz root=/dev/disk/by-partlabel/rootfs_b rootwait rw console=${cera_console} cera_slot=B
  initrd /initrd.img
}
