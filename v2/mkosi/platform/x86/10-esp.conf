# CeraLive v2 — x86 partition p1: ESP  (x86-ab layout; FROZEN slots reused from repart/)
#
# The x86/UEFI counterpart to the FROZEN repart/10-boot.conf (RK3588, Type=xbootldr).
# UEFI firmware boots ONLY from an EFI System Partition (GPT type EF00, C12A7328-…);
# the RK3588 xbootldr type is invisible to PC firmware. So x86 needs its OWN p1 def.
#
# WHY THIS FILE LIVES HERE (platform/x86/) AND NOT IN repart/:
#   repart/*.conf is the FROZEN v1 contract (docs/partition-contract.md, RK3588-only)
#   and must stay byte-for-byte unchanged (G3 / zero-diff). lib/assemble-disk-x86.sh
#   stages an x86 repart set by COPYING the frozen slot defs (20-rootfs_a.conf /
#   30-rootfs_b.conf / 40-data.conf) VERBATIM and adding THIS ESP def in their place
#   for p1 — so the rootfs_a/rootfs_b/data slots map to the exact frozen geometry,
#   while p1 becomes a bootable ESP instead of the RK3588 U-Boot boot medium.
#
# NO 16 MB RAW GAP: x86 has no raw idbloader/U-Boot/ATF before the GPT (UEFI lives
# in the platform's own SPI flash), so — unlike the RK3588 path — there is no leading
# gap and no sgdisk pre-seed: systemd-repart places this ESP at the 1 MB grain.
#
# NO Format= ON PURPOSE: assemble-disk-x86.sh formats the ESP as FAT32 standalone
# (mkfs.vfat -F 32), populates it offline with mtools (the removable-path GRUB binary
# /EFI/BOOT/BOOTX64.EFI + grub.cfg + grubenv), and dd's it into this partition's
# offset — mirroring how assemble-disk.sh fills the RK3588 vfat boot region. repart
# only needs to create the GPT ENTRY (type/label/size); it must not pre-format it.
#
# Referenced by PARTLABEL=boot (fstab mounts it at /boot/efi for RAUC's grubenv).

[Partition]
Type=esp
Label=boot
SizeMinBytes=256M
SizeMaxBytes=256M
GrowFileSystem=off
