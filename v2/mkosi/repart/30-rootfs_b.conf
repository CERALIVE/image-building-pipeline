# CeraLive v2 — partition p3: rootfs_b  (FROZEN contract docs/partition-contract.md §3)
#
# RAUC rootfs SLOT B. ext4, 4096 MB fixed — byte-for-byte the same geometry as
# rootfs_a (symmetric A/B). Referenced by PARTLABEL=rootfs_b; RAUC system.conf
# maps [slot.rootfs.1] bootname=B -> this partition (downstream, task 26).
#
# SINGLE-SLOT FALLBACK: for storage < 16 GB (contract §4/§5) this partition is
# OMITTED — there is no B slot, no field A/B rollback. The omission is driven by
# the board manifest `single_slot_fallback: true` flag, which the manifest
# resolver surfaces as $SINGLE_SLOT_FALLBACK; lib/assemble-disk.sh drops THIS
# file from the active repart set when the flag is true. Both current boards
# (orange-pi-5-plus, rock-5b-plus) have >=16 GB media => flag false => B present.
#
# Type/FS/grow rationale identical to rootfs_a (see 20-rootfs_a.conf).
#
# Size is part of the FROZEN contract — do NOT change without a fleet re-flash.

[Partition]
Type=linux-generic
Label=rootfs_b
Format=ext4
SizeMinBytes=4096M
SizeMaxBytes=4096M
GrowFileSystem=off
