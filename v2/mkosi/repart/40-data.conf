# CeraLive v2 — partition p4: data  (FROZEN contract docs/partition-contract.md §3/§6)
#
# Persistent, update-surviving mutable state — the SINGLE source of truth for all
# user/runtime state (CeraUI config, auth tokens, WiFi/NM profiles, logs, SRTLA
# routing state, machine identity). ext4.
#
# SHARED partition (NOT a RAUC slot): a RAUC A/B slot swap flips only the active
# rootfs (rootfs_a <-> rootfs_b); it NEVER touches `boot` or `data`. So everything
# on `data` survives every OS update. This is why mutable state must live HERE and
# never inside a rootfs slot (contract design rule 2). See README.md slot-swap note.
#
# Referenced by PARTLABEL=data. Downstream provisioning (task 30) bind-mounts /var
# state and WiFi creds onto this partition.
#
# SIZE = REMAINDER, with a >=2048 MB floor (contract §3). SizeMinBytes enforces the
# floor; no SizeMaxBytes => the default weight consumes ALL remaining capacity, and
# GrowFileSystem=on lets first boot grow the ext4 to the real medium size. This is
# the ONLY partition that flexes — boot + both rootfs slots are image-identical on
# every medium so one image flashes everywhere (contract design rule 1).
#
# Always the LAST partition (highest sort key) so the remainder lands at the tail.

[Partition]
Type=linux-generic
Label=data
Format=ext4
SizeMinBytes=2048M
GrowFileSystem=on
