# CeraLive v2 — partition p2: rootfs_a  (FROZEN contract docs/partition-contract.md §3)
#
# RAUC rootfs SLOT A (incl. this slot's own /boot kernel/DTB/initrd). ext4,
# 4096 MB fixed — IDENTICAL on every board and every storage medium so one built
# image flashes onto eMMC / NVMe / microSD without resizing.
#
# Referenced by PARTLABEL=rootfs_a. RAUC system.conf maps
# [slot.rootfs.0] bootname=A -> this partition.
#
# Type=linux-generic (NOT root-<arch>): selection is by PARTLABEL + RAUC bootname,
# never by GPT root auto-discovery. Two root-<arch> partitions (A+B) would make
# systemd-gpt-auto-generator ambiguous; linux-generic is inert to it.
#
# GrowFileSystem=off: RAUC writes an exact slot image; the slot must never grow.
# FS is ext4: signed plain-format RAUC bundles unpack rootfs.tar into the inactive
# slot. dm-verity is future bundle hardening, not the on-disk factory contract.
#
# Size is part of the FROZEN contract — do NOT change without a fleet re-flash.

[Partition]
Type=linux-generic
Label=rootfs_a
Format=ext4
SizeMinBytes=4096M
SizeMaxBytes=4096M
GrowFileSystem=off
