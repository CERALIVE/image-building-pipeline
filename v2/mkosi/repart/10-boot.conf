# CeraLive v2 — partition p1: boot  (FROZEN contract docs/partition-contract.md §3)
#
# U-Boot env + extlinux/extlinux.conf slot selector. FAT32 (vfat), 256 MB fixed.
# Referenced downstream by PARTLABEL=boot (never FS-UUID — UUIDs change on update).
#
# Type=xbootldr (Extended Boot Loader Partition), NOT esp: this is a U-Boot /
# extlinux boot medium on RK3588, not a UEFI ESP. install-boot.sh adds the explicit
# /boot fstab mount required because the slot's kernel makes that directory non-empty.
#
# SHARED partition (NOT a RAUC slot): identical across rootfs_a / rootfs_b, so an
# A/B slot swap never rewrites it. See README.md.
#
# Size is part of the FROZEN contract — do NOT change without a fleet re-flash.

[Partition]
Type=xbootldr
Label=boot
Format=vfat
SizeMinBytes=256M
SizeMaxBytes=256M
GrowFileSystem=off
