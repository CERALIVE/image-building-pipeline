# CeraLive v2 image pipeline — TOP-LEVEL / GLOBAL mkosi config
#
# Role: shared, arch-parametric foundation settings inherited by every
# sub-image under mkosi.images/. This top-level ("main") image is a pure
# ORCHESTRATOR: Format=none means it emits no artifact of its own. The actual
# Base OS layer is mkosi.images/base/ (Format=directory). Later platform/runtime
# layers and the final disk-assembly image attach here as additional sub-images.
#
# Layer model (see v2/mkosi/LAYER-MAP.md):
#   base      -> Format=directory rootfs tree: systemd/udev/ssh/dbus ONLY
#   platform  -> + HW-accel GStreamer + kernel / U-Boot / DTB / firmware (board-specific;
#                the ONLY arch-specific layer)
#   runtime   -> + shared.list package set + rauc/u-boot-tools +
#                system services / NM / SRTLA routing (arch-IDENTICAL)
#   app       -> + first-party cerastream / srtla / CeraUI + CERALIVE/srt fork .deb
#                (arch-IDENTICAL; PLACEHOLDER until Stage 3, tasks 22-23)
#   assembly  (later) -> Format=disk: partitions, dm-verity, A/B (RAUC)
#
# mkosi version is PINNED in ../.mkosi-version (= 26). CI asserts
# `mkosi --version` == that pin before building. mkosi >= 26 needs Python >= 3.12,
# so the BUILDER must be Debian trixie+ even though the target rootfs is bookworm.
#
# Architecture is PARAMETRIC. Default = arm64 (RK3588 device target).
# Override for x86:
#   mkosi --profile=amd64 ...            # friendly alias (mkosi.profiles/amd64.conf)
#   mkosi --architecture=x86-64 ...      # native mkosi name (mkosi has NO 'amd64')
#
# Native host build only — qemu-user-static handles arm64 emulation transparently
# (binfmt F-flag, kernel-global). Do NOT use mkosi's container/docker drivers.

[Config]
# The device image is the APP tree (top of the chain). Declaring it as the main
# image's only dependency makes a bare `mkosi build` build the whole layer chain
# in order:
#   base → platform (Dependencies=base) → runtime (Dependencies=platform)
#        → app (Dependencies=runtime).
# The final artifact the orchestrator ships is build/app. NOTE: in Stage 2 the app
# layer is a PLACEHOLDER (installs no first-party apps yet — Stage 3, tasks 22-23),
# so build/app == build/runtime content; the parity gate will report first-party
# app gaps until Stage 3 wires the install (intended, documented in LAYER-MAP.md).
Dependencies=app

# Propagate the orchestrator-forwarded build params into EVERY subimage. mkosi's
# --environment (set by lib/orchestrate.sh) only populates the MAIN image's script
# environment; the base/platform/runtime/app subimages each parse config in
# isolation and would otherwise see empty BOARD_ID/SHARED_PACKAGES/… (the runtime
# postinst then aborts with "SHARED_PACKAGES is empty"). PassEnvironment= makes
# these names universal so the subimage postinst/finalize scripts inherit them.
# Keep in lockstep with env_names in lib/orchestrate.sh:run_mkosi_build().
PassEnvironment=ARCH RELEASE CHANNEL VARIANT BOARD_ID FAMILY SERIAL_CONSOLE DTB_NAME
PassEnvironment=INSTALL_BOOT_BSP ARMBIAN_APT_URL ARMBIAN_SUITE
PassEnvironment=KERNEL_PACKAGES DTB_PACKAGES UBOOT_PACKAGES FIRMWARE_PACKAGES
PassEnvironment=HW_ACCEL_GSTREAMER_PLUGINS GSTREAMER_RUNTIME_PACKAGES
PassEnvironment=SHARED_PACKAGES SINGLE_SLOT_FALLBACK COMPATIBLE_STRING
PassEnvironment=APT_CLIENT_CRT_B64 APT_CLIENT_KEY_B64 APT_GPG_PUBLIC_B64
PassEnvironment=RAUC_ROOT_CA_B64 PASETO_PUBLIC_KEY_B64 CERALIVE_V2_DIR
PassEnvironment=CERALIVE_DEBUG_IMAGE CERALIVE_DEBUG_PASSWORD_HASH CERALIVE_IMAGE_BUILD_COMMIT

[Distribution]
Distribution=debian
Release=bookworm
Architecture=arm64
# Debian components — BUILD-TIME ONLY (Task 18: build-time apt-source reduction).
# mkosi auto-generates deb822 sources for bookworm, bookworm-updates and
# bookworm-security (deb.debian.org + security.debian.org, Signed-By
# debian-archive-keyring) and uses them to ASSEMBLE the image: the base bootstrap
# + every package installation the platform/runtime/app postinst scripts run.
#
# Components are trimmed to `main` — the MINIMUM the build needs:
#   * base Packages= (systemd/udev/openssh-server/dbus/apt/ca-certificates/kmod)
#     are all in main.
#   * platform BSP firmware/kernel/U-Boot come from the authenticated local
#     package directory; their Debian dependencies are in main.
#   * runtime/app install from the DEVICE source they write themselves
#     (see below), not from this build-time source.
# No build-time package install pulls from non-free-firmware, so enabling it here
# would be overly broad. shared.list carries zero non-free-firmware packages.
#
# DEVICE RUNTIME is untouched: the on-device apt config (the update channel
# software-updates.ts drives) is written separately by
# mkosi.images/runtime/mkosi.postinst.chroot::configure_minimal_apt, which emits
# `Components: main non-free-firmware` into /etc/apt/sources.list.d/debian.sources
# (+ the mTLS apt.ceralive.tv source). That deb822 source — NOT this build-time
# setting — is what gives the running device firmware access. E4 guardrail: never
# narrow it here.
Repositories=main

[Output]
# Orchestrator only — produces nothing itself; the base sub-image is the output.
Format=none
OutputDirectory=build

[Build]
# Reuse the apt package cache across builds. CacheDirectory is REQUIRED by the
# trixie builder's mkosi 25.3 whenever Incremental=yes (host mkosi 26 is lenient);
# set it explicitly so the config builds identically on both. The protected
# release workflow persists cache/ between production candidate builds.
#
# PER-BOARD isolation: ${BOARD_ID} (forwarded via PassEnvironment and exported by
# lib/orchestrate.sh) expands to a board-scoped cache/<board> tree so concurrent
# multi-board builds never share one cache (the T11 race). The orchestrator also
# passes --cache-directory cache/<board> on the CLI as the authoritative plumb;
# this default keeps a bare `mkosi build` (BOARD_ID set) isolated too.
Incremental=yes
CacheDirectory=cache/${BOARD_ID}
