# CeraLive v2 image pipeline — TOP-LEVEL / GLOBAL mkosi config
#
# Role: shared, arch-parametric foundation settings inherited by every
# sub-image under mkosi.images/. This top-level ("main") image is a pure
# ORCHESTRATOR: Format=none means it emits no artifact of its own. The actual
# Base OS layer is mkosi.images/base/ (Format=directory). Later platform/runtime
# layers and the final disk-assembly image attach here as additional sub-images.
#
# Layer model (see .omo/notepads/image-platform-redesign/):
#   base      (this stage) -> Format=directory rootfs tree: systemd/udev/ssh/dbus
#   platform  (later)      -> + kernel / U-Boot / DTB (board-specific)
#   runtime   (later)      -> + GStreamer / libsrt / ceracoder / srtla / CeraUI
#   assembly  (later)      -> Format=disk: partitions, dm-verity, A/B (RAUC)
#
# mkosi version is PINNED in ../.mkosi-version (= 26). CI asserts
# `mkosi --version` == that pin before building. mkosi >= 26 needs Python >= 3.12,
# so the BUILDER must be Debian trixie+ even though the target rootfs is bookworm.
#
# Architecture is PARAMETRIC. Default = arm64 (RK3588 device target).
# Override for x86:
#   mkosi --profile=amd64 ...            # friendly alias (mkosi.profiles/amd64.conf)
#   mkosi --architecture=x86-64 ...      # native mkosi name (mkosi has NO 'amd64')
#
# Native host build only — qemu-user-static handles arm64 emulation transparently
# (binfmt F-flag, kernel-global). Do NOT use mkosi's container/docker drivers.

[Distribution]
Distribution=debian
Release=bookworm
Architecture=arm64
# Debian components. mkosi auto-generates deb822 apt sources for bookworm,
# bookworm-updates and bookworm-security (deb.debian.org + security.debian.org,
# Signed-By debian-archive-keyring) — mirroring userpatches/customize-image.sh:63-81:
#
#   Types: deb
#   URIs: http://deb.debian.org/debian
#   Suites: bookworm bookworm-updates
#   Components: main non-free-firmware
#   Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
#   ---
#   Types: deb
#   URIs: http://security.debian.org/debian-security  (mkosi: .../debian-security)
#   Suites: bookworm-security
#   Components: main non-free-firmware
#   Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
Repositories=main,non-free-firmware

[Output]
# Orchestrator only — produces nothing itself; the base sub-image is the output.
Format=none
OutputDirectory=build

[Build]
# Reuse the apt package cache across builds. CacheDirectory is REQUIRED by the
# trixie builder's mkosi 25.3 whenever Incremental=yes (host mkosi 26 is lenient);
# set it explicitly so the config builds identically on both. CI persists cache/.
Incremental=yes
CacheDirectory=cache
