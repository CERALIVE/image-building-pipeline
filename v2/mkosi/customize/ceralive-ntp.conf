# CeraLive NTP configuration — explicit public NTP pools
#
# This file is installed into /etc/chrony/conf.d/ceralive-ntp.conf at image build time.
# It configures chrony with reliable public NTP pools for time synchronization.
#
# Pool selection: pool.ntp.org is the primary public pool; ntp.ubuntu.com provides
# Ubuntu-specific mirrors. Both are geographically distributed and highly available.
# The `iburst` option speeds up initial sync on boot (4 packets in quick succession
# instead of 1 per second).

# Primary NTP pool — geographically distributed, highly available
pool pool.ntp.org iburst

# Secondary pool — Ubuntu mirrors (good for Debian-based systems)
pool ntp.ubuntu.com iburst

# Makestep: allow large time jumps in the first 3 seconds of boot.
# This is safe because the device is not yet serving streams. After 3 seconds,
# chrony switches to gradual slewing (no hard jumps).
makestep 1 3
