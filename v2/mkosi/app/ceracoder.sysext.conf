# CeraLive v2 — ceracoder sysext descriptor (Stage 3, task 22).
#
# Declarative input to build-ceracoder-sysext.sh. KEY=value only (sourced by the
# build lib under common.sh strict mode — no logic, no side effects here). The
# SYSEXT_OS_ID / SYSEXT_OS_VERSION_ID / SYSEXT_LEVEL trio are the exact env knobs
# the app-layer sysext backend (v2/lib/app-layer/sysext.sh) reads to stamp
# /usr/lib/extension-release.d/extension-release.<NAME>.
#
# shellcheck shell=bash
# shellcheck disable=SC2034  # consumed externally by sysext-build.lib.sh after `source`

# Extension identity → <NAME>.raw and extension-release.<NAME>.
SYSEXT_NAME=ceracoder

# Debian package (in the first-party staging dir) whose payload feeds this sysext.
SYSEXT_DEB_PACKAGE=ceracoder

# Binaries that MUST resolve after extraction+prune, or the build fails loudly.
SYSEXT_REQUIRED_BINARIES="usr/bin/ceracoder"

# Runtime/Platform-owned shared objects that must NEVER be bundled into the app
# sysext (matched by basename anywhere in the tree). libsrt ships from the
# Runtime OS slot (libsrt1.5-openssl); the Rockchip MPP / HW-accel GStreamer
# plugins ship from the Platform layer (kernel-coupled). Bundling a second copy
# would shadow the OS one and defeat atomic libsrt RAUC updates.
SYSEXT_EXCLUDE_NAMES="libsrt.so* libsrt-*.so* librockchip_mpp.so* librockchip_vpu.so* libgstrockchip*.so* gstreamer1.0-rockchip*"

# extension-release matching identity. Debian bookworm across the whole stack.
SYSEXT_OS_ID=debian
SYSEXT_OS_VERSION_ID=12
SYSEXT_LEVEL=1
