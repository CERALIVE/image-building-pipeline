# CeraLive v2 — cog-display feature sysext descriptor (Stage 5, task 36).
#
# Declarative build recipe for the Cog + WPE WebKit single-window kiosk browser
# shipped as an OPTIONAL display-engine add-on (a lighter alternative to the
# cage + Chromium kiosk chassis in v2/docs/kiosk-display.md). The authoritative
# packaging spec is v2/docs/cog-display-addon.md; the runtime-facing descriptor
# CeraUI reads at install time is v2/manifests/addons/cog-display.json.
#
# HOW THIS DIFFERS FROM srtla.sysext.conf
#   The first-party app sysexts are built from a SINGLE first-party .deb by
#   sysext-build.lib.sh (SYSEXT_DEB_PACKAGE). Cog instead is assembled from a
#   Debian apt CLOSURE (bookworm main/arm64 — A1) into a staging tree, which is
#   then handed to lib/build-feature-sysext.sh to produce a SIGNED per-board/
#   per-OS artifact:  cog-display-<board>-<os_version>.raw  (+ .raw.sha256 +
#   .raw.sig, gpgv-verifiable against the image-baked add-on PUBLIC keyring).
#
# HARDWARE GATE (honest caveat)
#   The real apt-closure build + render QA require a physical RK3588 (Task 1
#   spike: NO-GO). This file is therefore a SCAFFOLD/recipe: it documents exactly
#   what the closure build must download, exclude, and assert. The build+sign
#   pipeline itself is proven against a STUB staging tree (see
#   test-results/task-36-cog-sysext.txt); the production payload lands only after
#   the hardware render-QA gate clears (cog-display-addon.md §7, TD-C4).
#
# KEY=value only (no logic / no side effects — documentation scaffold).
# shellcheck shell=bash
# shellcheck disable=SC2034  # consumed externally / scaffold; not all keys read yet

# Extension identity → cog-display-<board>-<os>.raw and extension-release.cog-display.
SYSEXT_NAME=cog-display

# Per-board artifacts this recipe produces. The Cog .raw PAYLOAD is ARCH-NEUTRAL —
# byte-identical across both RK3588 boards (the SoC-specific GPU userspace is the
# Platform-layer piece below, NOT in this sysext). The per-board NAME is the
# build-feature-sysext.sh contract (<feature>-<board>-<os>.raw); the runtime
# descriptor's urlTemplate addresses them via its {board}+{os_version} tokens.
SYSEXT_BOARD_VARIANTS="rock-5b-plus orange-pi-5-plus"

# ACQUISITION (A1): apt closure from Debian bookworm main/arm64 — NOT a first-party
# .deb, NOT a backport, NOT a third-party repo. Resolved+downloaded into a staging
# dir per cog-display-addon.md §4.1 (apt-get install --download-only cog), then
# squashed. Versions float at bookworm main (cog 0.16.1-1, libwpewebkit-1.1-0
# 2.38.6-1) and are pinned in versions.yaml only AFTER render QA passes (TD-C1).
#   cog          single-window WPE WebKit kiosk browser (the launcher)
#   wpewebkit    libwpewebkit-1.1-0 — the renderer (dominant size term, ~80 MB)
#   cage         Wayland compositor (Cog's `wl` platform; direct-DRM mode skips it)
# The remaining names are cog's hard runtime closure MINUS what the Runtime OS
# layer already merges (GStreamer/glib/cairo/fontconfig/freetype — shared.list).
SYSEXT_APT_PACKAGES="cog libwpewebkit-1.1-0 libwpe-1.0-1 libwpebackend-fdo-1.0-1 libsoup-3.0-0 libicu72 libepoxy0 libharfbuzz-icu0 libmanette-0.2-0 libwebp7 libwoff1 libopenjp2-7 liblcms2-2 cage libwayland-client0 libwayland-server0"

# Binaries that MUST resolve after extraction+prune, or the build fails loudly.
SYSEXT_REQUIRED_BINARIES="usr/bin/cog usr/bin/cage"

# Platform/Runtime-owned shared objects that must NEVER ship in this sysext
# (matched by BASENAME anywhere in the extracted tree; the build fails if any
# survives the prune). The load-bearing exclusion is libmali* (A2):
#   libmali*                         Mali-G610 Valhall GPU userspace — Platform BSP
#                                    (cog-display-addon.md §5). Sourced from the
#                                    Radxa/Rockchip BSP, merged via the Platform OS
#                                    slot; a bundled copy here would overlay-shadow
#                                    the Mali stack and break EGL/GBM init.
#   libEGL*/libGLESv2*/libGLESv1*/   the GLVND / GPU vendor impl libmali provides
#   libgbm*/libwayland-egl*          on-device; a bundled mesa/GLVND copy would
#                                    shadow the Mali stack — keep BOTH out.
#   librockchip_mpp.so*/             Platform HW-accel userspace (defensive; the
#   librockchip_vpu.so*/             identical contract the srtla sysext enforces).
#   libgstrockchip*/gstreamer1.0-rockchip*
SYSEXT_EXCLUDE_NAMES="libmali.so* libmali-*.so* libEGL.so* libGLESv2.so* libGLESv1*.so* libgbm.so* libwayland-egl.so* librockchip_mpp.so* librockchip_vpu.so* libgstrockchip*.so* gstreamer1.0-rockchip*"

# PER-BOARD GPU USERSPACE VARIANT (Platform-layer, EXCLUDED above — documented for
# the build operator). Both RK3588 boards need the Mali-G610 Valhall WAYLAND-GBM
# userspace (the variant a Wayland/direct-DRM Cog needs), sourced from the
# Radxa/Rockchip BSP (TD-C2) and delivered atomically through the Platform RAUC OS
# slot — the add-on relies on that merge for EGL/GLESv2/GBM and ships NONE of it:
#   rock-5b-plus      -> libmali-valhall-g610-g24p0-wayland-gbm   (RK3588  G610, g24p0)
#   orange-pi-5-plus  -> libmali-valhall-g610-g24p0-wayland-gbm   (RK3588S G610, g24p0)
# GLVND-dispatcher stubs (libegl1/libgbm1) vs dpkg-divert wiring is a render-QA
# detail to settle on hardware (cog-display-addon.md §5 / §7).
SYSEXT_BOARD_GPU_USERSPACE="libmali-valhall-g610-g24p0-wayland-gbm"

# This is the WPE WebKit engine, NOT Chromium. Recorded so a future closure edit
# can never silently drag Chromium (or a libmali blob) into the add-on payload.
SYSEXT_FORBID_PACKAGES="chromium chromium-common libmali-valhall-g610"

# extension-release matching identity (G1). Debian bookworm across the whole stack.
# build-feature-sysext.sh re-asserts SYSEXT_LEVEL=1 + VERSION_ID=12 by reading them
# BACK out of the produced squashfs — these are the merge keys the kernel uses.
SYSEXT_OS_ID=debian
SYSEXT_OS_VERSION_ID=12
SYSEXT_LEVEL=1
