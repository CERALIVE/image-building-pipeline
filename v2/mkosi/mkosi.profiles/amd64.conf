# Profile: amd64
#
# Friendly alias for an x86_64 build. mkosi's architecture identifier is
# 'x86-64' (there is NO 'amd64' choice in mkosi --architecture), so this profile
# exists purely so operators can request the familiar name:
#
#   mkosi --profile=amd64 ...        # this file -> Architecture=x86-64
#
# Equivalent to the native flag:
#
#   mkosi --architecture=x86-64 ...
#
# Default (no profile) builds arm64 (RK3588 device target). Profiles are global,
# so the override applies to every sub-image (base + future layers).

[Distribution]
Architecture=x86-64
