# CeraLive v2 — REAL-HARDWARE job (RK3588 on a self-hosted runner).
#
# Runs the LIVE acceptance gates on a PHYSICAL RK3588 board attached to a
# self-hosted runner labeled `ceralive-rk3588`:
#   * v2/tests/realhw-smoke.sh   (LIVE)  — boot/service/binary/quirk + full parity
#   * v2/tests/rauc-rollback.sh  (LIVE)  — A/B rollback (bad → fallback) + commit
#
# DESIGN / SAFETY (see v2/ci/runner-setup.md):
#   * NEVER on every PR. Triggers are workflow_call (label-gated by the caller),
#     a nightly schedule, and manual dispatch — `pull_request` is NOT a trigger.
#   * Scarce/slow/physical HW stays OUT of the PR critical path; offline gates in
#     .github/workflows/v2-ci.yml (ubuntu-latest) keep fast PR feedback.
#   * timeout-minutes caps a wedged board; max-parallel 1 + concurrency serialize
#     access to the single board; 1 retry only, then escalate to a human.
#   * Credentials are PRIVATE: the board SSH key + maskrom tooling live ON the
#     runner host (outside the job checkout) — NOT in public-repo secrets. The
#     job references no secrets here.
#
# ACTIVATION: GitHub requires reusable workflows under .github/workflows/. This
# file is authored/reviewed in v2/ci/ (the pipeline CI home, next to
# validate-manifests.py); copy or symlink it to .github/workflows/realhw-job.yml
# to activate, or have a caller `uses:` it from there. See runner-setup.md §8.

name: v2 Real-HW (RK3588)

on:
  # Reusable: a caller wires this behind a LABEL gate so a maintainer can run it
  # on a specific PR on demand (e.g. on: pull_request: types:[labeled],
  # if: label.name == 'ci:real-hw'). NOT auto-run on every PR.
  workflow_call:
    inputs:
      board:
        description: 'RK3588 board manifest name (manifests/boards/<board>.yaml)'
        type: string
        required: false
        default: rock-5b-plus
      board_ip:
        description: 'LIVE board IP for SSH (defaults to the BOARD_IP runner var)'
        type: string
        required: false
        default: ''
  # Nightly drift catcher — 02:00 UTC.
  schedule:
    - cron: '0 2 * * *'
  # Manual on-demand run.
  workflow_dispatch:
    inputs:
      board:
        description: 'RK3588 board manifest name'
        type: string
        required: false
        default: rock-5b-plus

# Least privilege: read the repo, write a check-run/artifacts. No write token.
permissions:
  contents: read

# Serialize: there is ONE physical board. Never run two HW jobs against it at
# once; let an in-flight HW run finish rather than cancel mid-flash.
concurrency:
  group: realhw-rk3588-${{ inputs.board || 'rock-5b-plus' }}
  cancel-in-progress: false

jobs:
  realhw-smoke:
    name: real-HW smoke + rollback (${{ inputs.board || 'rock-5b-plus' }})
    # THE contract: only the self-hosted runner physically wired to an RK3588.
    runs-on: [self-hosted, ceralive-rk3588]
    timeout-minutes: 30
    env:
      BOARD: ${{ inputs.board || 'rock-5b-plus' }}
      # BOARD_IP / SSH_USER resolve from runner-level vars set on the HW host
      # (Settings → Actions → Variables), so no IP/credential is in this file.
      BOARD_IP: ${{ inputs.board_ip || vars.CERALIVE_RK3588_BOARD_IP }}
      SSH_USER: ${{ vars.CERALIVE_RK3588_SSH_USER || 'ceralive' }}
      SSH_PORT: ${{ vars.CERALIVE_RK3588_SSH_PORT || '22' }}
      # Bundles + last-known-good image staged on the runner host by the lab
      # operator (NOT downloaded here) — paths are runner vars.
      BUNDLE_DIR: ${{ vars.CERALIVE_RK3588_BUNDLE_DIR }}
      LAST_GOOD_IMAGE: ${{ vars.CERALIVE_RK3588_LAST_GOOD_IMAGE }}
      # Serial + power control commands the runner host provides (see
      # runner-setup.md §3/§5). Empty → that step degrades to a warning.
      SERIAL_DEV: ${{ vars.CERALIVE_RK3588_SERIAL_DEV || '/dev/ttyUSB0' }}
      SERIAL_BAUD: '1500000'
    steps:
      - uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Preflight: make sure the board is ALIVE before touching it. If a prior
      # job left it bricked, the operator's recovery hook (maskrom reflash of
      # LAST_GOOD_IMAGE) runs here. This is the idempotent "ensure alive" gate
      # from runner-setup.md §7. We do NOT auto-flash unless the board is dead.
      # ---------------------------------------------------------------------
      - name: Preflight — board reachable (else maskrom-recover last-known-good)
        run: |
          set -euo pipefail
          if [[ -z "${BOARD_IP}" ]]; then
            echo "::error::BOARD_IP unset — set the CERALIVE_RK3588_BOARD_IP runner var or pass board_ip input"
            exit 1
          fi
          if ssh -o BatchMode=yes -o ConnectTimeout=10 \
                 -o StrictHostKeyChecking=accept-new \
                 -p "${SSH_PORT}" "${SSH_USER}@${BOARD_IP}" true 2>/dev/null; then
            echo "board alive at ${BOARD_IP}"
          else
            echo "::warning::board unreachable — attempting maskrom recovery of last-known-good"
            if [[ -n "${LAST_GOOD_IMAGE}" && -f "${LAST_GOOD_IMAGE}" ]] && command -v rkdeveloptool >/dev/null; then
              # Operator wiring: power-cycle into maskrom is provided by a host
              # helper (relay + recovery pin). See runner-setup.md §3/§7.
              "${CERALIVE_RK3588_POWER_HELPER:-true}" maskrom || true
              rkdeveloptool ld
              rkdeveloptool db "${RK3588_LOADER:-/opt/ceralive/rk3588_loader.bin}"
              rkdeveloptool wl 0 "${LAST_GOOD_IMAGE}"
              rkdeveloptool rd
            else
              echo "::error::board down and no recovery image/tooling on the runner — human escalation required"
              exit 1
            fi
          fi

      # ---------------------------------------------------------------------
      # Start capturing serial for the whole run so a failed boot is debuggable
      # (runner-setup.md §5.2). Non-fatal if the UART isn't present.
      # ---------------------------------------------------------------------
      - name: Start serial capture
        run: |
          set -uo pipefail
          mkdir -p artifacts
          if [[ -c "${SERIAL_DEV}" ]]; then
            stty -F "${SERIAL_DEV}" "${SERIAL_BAUD}" raw -echo || true
            ( cat "${SERIAL_DEV}" > artifacts/serial-boot.log 2>&1 & echo $! > artifacts/serial.pid )
            echo "capturing serial from ${SERIAL_DEV} @ ${SERIAL_BAUD}"
          else
            echo "::warning::${SERIAL_DEV} not present — skipping serial capture"
          fi

      # ---------------------------------------------------------------------
      # Flash the image-under-test. Default path: SSH `dd` (fast, board boots).
      # If a built image artifact is provided, write it; otherwise smoke-test the
      # CURRENT on-board image (LIVE mode just needs a booted board). Flashing is
      # opt-in via the FLASH_IMAGE runner var to avoid needless eMMC wear.
      # ---------------------------------------------------------------------
      - name: Flash image-under-test (optional, SSH dd fast-path)
        if: ${{ vars.CERALIVE_RK3588_FLASH_IMAGE != '' }}
        run: |
          set -euo pipefail
          img="${{ vars.CERALIVE_RK3588_FLASH_IMAGE }}"
          echo "flashing ${img} → board eMMC via ssh dd"
          if [[ "${img}" == *.xz ]]; then
            xz -dc "${img}" | ssh -o BatchMode=yes -p "${SSH_PORT}" \
              "${SSH_USER}@${BOARD_IP}" 'sudo dd of=/dev/mmcblk0 bs=4M conv=fsync status=progress'
          else
            ssh -o BatchMode=yes -p "${SSH_PORT}" "${SSH_USER}@${BOARD_IP}" \
              'sudo dd of=/dev/mmcblk0 bs=4M conv=fsync status=progress' < "${img}"
          fi
          ssh -o BatchMode=yes -p "${SSH_PORT}" "${SSH_USER}@${BOARD_IP}" 'sudo reboot' || true
          # wait for SSH to return after the reflash reboot
          for _ in $(seq 1 18); do
            sleep 5
            ssh -o BatchMode=yes -o ConnectTimeout=10 -p "${SSH_PORT}" \
              "${SSH_USER}@${BOARD_IP}" true 2>/dev/null && break
          done

      # ---------------------------------------------------------------------
      # GATE 1 — real-HW boot/service/binary/quirk smoke + full live parity.
      # ---------------------------------------------------------------------
      - name: realhw-smoke.sh (LIVE)
        run: |
          set -euo pipefail
          chmod +x v2/tests/realhw-smoke.sh
          BOARD="${BOARD}" BOARD_IP="${BOARD_IP}" \
          SSH_USER="${SSH_USER}" SSH_PORT="${SSH_PORT}" \
          ./v2/tests/realhw-smoke.sh 2>&1 | tee artifacts/realhw-smoke.log

      # ---------------------------------------------------------------------
      # GATE 2 — real-HW RAUC A/B rollback (bad → fallback to A) + commit (good
      # → mark-good → persists). Requires signed bad.raucb/good.raucb in
      # BUNDLE_DIR on the runner host. Skips (with a warning) if absent so the
      # smoke gate can still run standalone.
      # ---------------------------------------------------------------------
      - name: rauc-rollback.sh (LIVE)
        run: |
          set -euo pipefail
          if [[ -z "${BUNDLE_DIR}" || ! -s "${BUNDLE_DIR}/bad.raucb" || ! -s "${BUNDLE_DIR}/good.raucb" ]]; then
            echo "::warning::BUNDLE_DIR has no bad.raucb/good.raucb — skipping LIVE rollback gate (provide signed bundles on the runner host)"
            exit 0
          fi
          chmod +x v2/tests/rauc-rollback.sh
          BOARD_IP="${BOARD_IP}" SSH_USER="${SSH_USER}" SSH_PORT="${SSH_PORT}" \
          BUNDLE_DIR="${BUNDLE_DIR}" \
          ./v2/tests/rauc-rollback.sh 2>&1 | tee artifacts/rauc-rollback.log

      # ---------------------------------------------------------------------
      # Always collect diagnostics: serial log + on-board rauc status/journal.
      # ---------------------------------------------------------------------
      - name: Collect diagnostics (always)
        if: ${{ always() }}
        run: |
          set -uo pipefail
          # stop serial capture
          [[ -f artifacts/serial.pid ]] && kill "$(cat artifacts/serial.pid)" 2>/dev/null || true
          if [[ -n "${BOARD_IP}" ]]; then
            ssh -o BatchMode=yes -o ConnectTimeout=10 -p "${SSH_PORT}" \
              "${SSH_USER}@${BOARD_IP}" 'rauc status 2>/dev/null; echo "---"; \
              journalctl -b --no-pager -n 200 2>/dev/null' \
              > artifacts/board-diagnostics.log 2>&1 || \
              echo "board unreachable at diagnostics collection" > artifacts/board-diagnostics.log
          fi

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: realhw-${{ env.BOARD }}-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
