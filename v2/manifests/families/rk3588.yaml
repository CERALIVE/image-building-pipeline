# CeraLive Image Family Manifest — Rockchip RK3588 / RK3588S
#
# Validates against ../schema/family.schema.json (draft 2020-12).
# Captures SoC/arch-level build attributes shared by every rk3588 board
# (Orange Pi 5+, Radxa Rock 5B+). Per-board variance lives in ../boards/*.yaml.
#
# Decision D3 (locked): kernel/U-Boot branch = `vendor` (HDMI hdmirx + mature
# MPP HW-encode require the vendor kernel) and RAUC bootloader adapter = `custom`
# (the staged vendor U-Boot lacks persistent fw_setenv → FAT-file bootcount approach).
#
# Sources: configs/devices/{rock5bplus,orangepi5plus}.conf (BOARD_PACKAGES),
# userpatches/config-{rock5bplus,orangepi5plus}.conf (BRANCH=, EXTRA_BSP_PACKAGES),
# configs/base/ceraui-base.conf (STREAMING_PACKAGES HW path).

arch: arm64

# BRANCH= from userpatches/config-*.conf (both boards) — NOT the dead
# ARMBIAN_BRANCH=current in configs/devices/*.conf. Decision D3.
armbian_branch: vendor

# linux-image-* of BOARD_PACKAGES, resolved to the `vendor` branch (D3). The
# Armbian bookworm arm64 vendor kernel for RK35xx SoCs ships as -rk35xx (the
# -rockchip64 name was a migration placeholder that doesn't exist in the feed).
kernel_packages:
  - linux-image-vendor-rk35xx

# RK3588 U-Boot is BOARD-SPECIFIC in the Armbian feed (linux-u-boot-<board>-vendor),
# so the family declares none — each board names its own via the board manifest's
# uboot_packages override (board arrays REPLACE family arrays on deep-merge). The
# old rkbin-rk3588 entry was an internal placeholder; no such package exists in apt.
uboot_packages: []

# linux-dtb-* of BOARD_PACKAGES, resolved to the `vendor` branch (D3). Matches the
# -rk35xx vendor kernel naming above (the -rockchip64 name was a placeholder).
dtb_packages:
  - linux-dtb-vendor-rk35xx

# Shared SoC/GPU/Wi-Fi firmware. armbian-firmware is the broad Armbian firmware
# bundle (ships realtek + broadcom WiFi blobs).
#
# Task 19 firmware-split audit — KEEP armbian-firmware, do NOT swap to the Debian
# split (firmware-realtek + firmware-brcm80211). Both rk3588 boards run the Armbian
# VENDOR kernel (Decision D3) whose out-of-tree WiFi/BT drivers expect Armbian's
# board-matched blobs AND per-board NVRAM config files:
#   * Rock 5B+   → RTL8852BE  (was rtl8852be-firmware + firmware-realtek)
#   * Orange Pi 5+ → AP6275P / brcmfmac (Broadcom)
# Debian's split packages target the MAINLINE in-tree drivers and omit the Armbian
# NVRAM (.txt) files, so a swap risks WiFi never associating on the vendor kernel.
# `armbian-firmware` is already the TRIMMED Armbian variant (NOT armbian-firmware-full),
# i.e. the narrowest safe lever available — there is no finer split that keeps the
# vendor-kernel WiFi/BT path intact. Size/feasibility detail: v2/docs/size-notes.md.
#
# The Mali-G610 (Valhall) GPU userspace driver (libEGL/libGLESv2/libgbm) is NOT in
# the Armbian bookworm arm64 feed. It is pinned to an exact upstream release asset
# and SHA-256-verified in ../rk3588-userspace-deb-versions.txt (staged by
# fetch_rk3588_userspace, excluded from the Armbian fetch). The g24p0 wayland-gbm
# variant is the one the default kiosk (cage = a Wayland compositor) needs — see
# v2/docs/cog-display-addon.md §5. It unblocks the 5.4 Kiosk / Cog+WPEWebKit EGL/GBM
# path; on-hardware render stays the HW-gated QA item (cog-display-addon.md §7). The
# GPU's CSF firmware blob rides the vendor kernel / armbian-firmware.
firmware_packages:
  - armbian-firmware
  - libmali-valhall-g610-g24p0-wayland-gbm

# Decision D3: vendor U-Boot has no fw_setenv → raw GPT bootcount approach.
rauc_bootloader_adapter: custom

# Hardware-accelerated GStreamer encode/decode (Rockchip MPP) feeding
# VIDEO_ENCODER/VIDEO_DECODER=rk3588_mpp. gstreamer1.0-rockchip1 registers
# mpph264enc/mpph265enc/mppjpegenc/mppvp8enc against the MPP runtime below — PROVEN
# on real Rock 5B+ hardware (ffprobe-verified raw H.264/H.265 HW encode). It is NOT
# in the Armbian bookworm arm64 feed; pinned + SHA-256-verified in
# ../rk3588-userspace-deb-versions.txt (radxa rk3588s2-bookworm build — tsukumijima
# publishes no gst-rockchip mirror). Staged by fetch_rk3588_userspace.
hw_accel_gstreamer_plugins:
  - gstreamer1.0-rockchip1

# Runtime multimedia support for the MPP HW-accel path. librockchip-mpp1 is the MPP
# encode/decode runtime the gst plugin dlopens; librga2 is the RGA 2D accelerator it
# links; rockchip-multimedia-config ships the udev/config glue; librockchip-mpp-dev
# accompanies the MPP runtime to mirror the exact hardware-proven asset set. None are
# in the Armbian bookworm arm64 feed — all pinned + SHA-256-verified in
# ../rk3588-userspace-deb-versions.txt and staged by fetch_rk3588_userspace.
gstreamer_runtime_packages:
  - rockchip-multimedia-config
  - librga2
  - librockchip-mpp1
  - librockchip-mpp-dev

# Frozen A/B layout, docs/partition-contract.md §3 (v1). NAME reference only —
# sizes/slot roles/threshold live in the frozen contract, never duplicated here.
partition_template: rk3588-ab

# SERIALCON from userpatches/config-*.conf (identical on both boards).
serial_console: ttyS2:1500000
